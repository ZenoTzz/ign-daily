<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史 — IGN Daily</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="assets/alpine.min.js"></script>
  <link rel="stylesheet" href="assets/style.css?v=20260616theme2">
  <link rel="stylesheet" href="assets/workspace-ui.css?v=20260711refactor1">
  <script src="assets/app.js?v=20260721cookieauth1"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 600:'#a01620',700:'#7e1219' }}}}}
  </script>
  <link rel="stylesheet" href="assets/compliance.css?v=20260710beian2">
  <script defer src="assets/compliance.js?v=20260709beian1"></script>
</head>
<body class="workspace-page antialiased">
  <div x-data="historyData()" x-init="init()" class="min-h-screen">
    <header class="bg-white border-b sticky top-0 z-10">
      <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
        <a href="index.html" class="text-slate-500 hover:text-brand-600">←</a>
        <h1 class="text-lg font-bold">📅 历史归档</h1>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-4">
      <div x-show="loading" class="text-center py-12 text-slate-400">加载中...</div>

      <div x-show="!loading && dates.length === 0" class="text-center py-12 text-slate-400">
        暂无历史数据
      </div>

      <div class="space-y-4">
        <template x-for="d in dates" :key="d.date">
          <div class="bg-white rounded-xl border p-4 shadow-sm">
            <div class="flex items-center justify-between mb-2">
              <h2 class="font-semibold">
                <a :href="`index.html?date=${d.date}`" class="hover:text-brand-600" x-text="d.date"></a>
              </h2>
              <span class="text-xs text-slate-500">
                <span x-text="`共 ${d.total} 条`"></span> · 
                <span class="text-green-600" x-text="`${d.translated} 篇已翻译`"></span>
              </span>
            </div>
            <div x-show="d.translatedTitles.length > 0" class="text-sm space-y-1">
              <template x-for="t in d.translatedTitles">
                <div class="flex items-center gap-2">
                  <span class="text-xs text-slate-400" x-text="`#${t.id}`"></span>
                  <a :href="`article.html?date=${d.date}&id=${t.id}`"
                    class="text-slate-700 hover:text-brand-600" x-text="t.cn_title"></a>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </main>
  </div>

  <script>
    function historyData() {
      return {
        loading: true,
        dates: [],

        async init() {
          // 从 data/index-list.json 读取已归档日期清单
          let baseList = [];
          try {
            const res = await fetch('data/index-list.json?t=' + Date.now(), { cache: 'no-store' });
            if (res.ok) {
              baseList = await res.json();
            }
          } catch (e) {}

          // 今天的数据总是从 index.json 实时读取（保证翻译计数最新）
          const today = new Date().toLocaleDateString('zh-CN', {
            timeZone: 'Asia/Shanghai',
            year: 'numeric', month: '2-digit', day: '2-digit'
          }).replace(/\//g, '-');
          // toLocaleDateString 可能返回 2026-05-28 或 2026/05/28，统一处理
          const todayKey = today.split('-').map(s => s.padStart(2, '0')).join('-');

          try {
            const r = await fetch(`data/${todayKey}/index.json?t=${Date.now()}`, { cache: 'no-store' });
            if (r.ok) {
              const data = await r.json();
              const translated = data.articles.filter(a => a.translation_status === 'done');
              const todayEntry = {
                date: todayKey,
                total: data.total,
                translated: translated.length,
                translatedTitles: translated.map(a => ({ id: a.id, cn_title: a.cn_title }))
              };
              // 在 baseList 中替换/插入今天的条目
              const existIdx = baseList.findIndex(d => d.date === todayKey);
              if (existIdx >= 0) {
                baseList[existIdx] = todayEntry;
              } else {
                baseList.unshift(todayEntry);
              }
            }
          } catch (_) {}

          this.dates = baseList.sort((a, b) => b.date.localeCompare(a.date));
          this.loading = false;
        }
      }
    }
  </script>
  <footer class="site-compliance-footer" aria-label="备案信息">
    <div class="site-compliance-inner">
      <span data-compliance="copyright">Copyright © 2026 IGN Daily</span>
      <a data-compliance="icp" href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">粤ICP备2026092594号</a>
    </div>
  </footer>
</body>
</html>
