name: DeepSeek Usage Snapshot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ign-daily-write-main
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update checkout to latest main
        run: git pull --ff-only origin main

      - name: Load automation config
        id: config
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          path = Path("data/automation-config.json")
          data = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}
          print(f"api_base_url={data.get('api_base_url', '')}")
          PY

      - name: Fetch DeepSeek balance
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
        run: |
          python3 scripts/deepseek_balance.py

      - name: Commit and push usage snapshot
        run: |
          set -euo pipefail
          git add data/usage
          if git diff --cached --quiet; then
            echo "No DeepSeek usage snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore: update DeepSeek usage snapshot"
          git pull --rebase -X theirs origin main
          git push origin HEAD:main
