name: Exchange Rates

on:
  schedule:
    - cron: "20 0 * * *" # 08:20 Asia/Hong_Kong
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ign-daily-write-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update checkout to latest main
        run: git pull --ff-only origin main

      - name: Refresh exchange rates
        run: |
          python3 scripts/fetch_exchange_rates.py
          python3 scripts/check_exchange_rates_fresh.py --max-age-hours 6

      - name: Commit and push exchange rates
        run: |
          set -euo pipefail
          git add exchange_rates.json
          if git diff --cached --quiet; then
            echo "No exchange-rate changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh exchange rates"
          git pull --rebase -X theirs origin main
          git push origin HEAD:main
