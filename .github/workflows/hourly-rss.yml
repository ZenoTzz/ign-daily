name: Hourly RSS

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ign-daily-write-main
  cancel-in-progress: false

jobs:
  rss:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Load automation config
        id: config
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          path = Path("data/automation-config.json")
          data = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}
          print(f"title_translator={data.get('title_translator', 'openclaw')}")
          print(f"fulltext_translator={data.get('fulltext_translator', 'openclaw')}")
          print(f"api_model={data.get('api_model', '')}")
          print(f"api_title_model={data.get('api_title_model', data.get('api_model', ''))}")
          print(f"api_base_url={data.get('api_base_url', '')}")
          PY

      - name: Run RSS incremental fetch
        id: rss
        env:
          IGN_DAILY_SKIP_GIT: "1"
        run: |
          set -euo pipefail
          python3 scripts/ign_rss_incremental.py
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          path = Path("ign_rss_new.json")
          if not path.exists():
              print("new_count=0")
              print("filtered_count=0")
              print("cleanup_count=0")
              print("changed_count=0")
              print("target_date=")
              raise SystemExit

          data = json.loads(path.read_text(encoding="utf-8-sig"))
          print(f"new_count={data.get('new_count', 0)}")
          print(f"filtered_count={data.get('filtered_count', 0)}")
          print(f"cleanup_count={data.get('cleanup_count', 0)}")
          print(f"changed_count={data.get('changed_count', data.get('new_count', 0))}")
          print(f"target_date={data.get('target_date', '')}")
          PY

      - name: Stop when there are no RSS changes
        if: steps.rss.outputs.changed_count == '0'
        run: |
          rm -f ign_rss_new.json
          echo "No new RSS articles or filtered quarantine changes."

      - name: Validate RSS queue
        if: steps.rss.outputs.new_count != '0'
        run: |
          python3 scripts/rss_queue_check.py "${{ steps.rss.outputs.target_date }}"
          python3 scripts/agent_doctor.py

      - name: Cache clean article sources
        if: steps.rss.outputs.new_count != '0'
        run: |
          python3 scripts/article_cache.py "${{ steps.rss.outputs.target_date }}" --missing --limit 20
          python3 scripts/agent_doctor.py

      - name: Refresh exchange rates
        if: steps.rss.outputs.new_count != '0' && (steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek')
        run: |
          set -euo pipefail
          python3 scripts/fetch_exchange_rates.py || echo "WARN: exchange-rate refresh failed; title translation will use fallback/local rates."

      - name: Translate queued titles with DeepSeek
        if: steps.rss.outputs.new_count != '0' && (steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek')
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          TRANSLATOR_MODEL: ${{ steps.config.outputs.api_title_model || steps.config.outputs.api_model || vars.TRANSLATOR_TITLE_MODEL || vars.TRANSLATOR_MODEL || vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          TRANSLATOR_TITLE_LIMIT: "30"
        run: |
          set -euo pipefail
          if [ -z "${TRANSLATOR_API_KEY:-}" ]; then
            echo "title_translator=api but TRANSLATOR_API_KEY/DEEPSEEK_API_KEY is not set."
            exit 1
          fi
          python3 scripts/translate_titles_deepseek.py "${{ steps.rss.outputs.target_date }}"
          python3 scripts/pre_push_check.py "${{ steps.rss.outputs.target_date }}"
          python3 scripts/agent_doctor.py

      - name: Commit and push RSS update
        if: steps.rss.outputs.changed_count != '0'
        run: |
          set -euo pipefail
          git add data ign_rss_new.json
          if git diff --cached --quiet; then
            echo "No tracked RSS changes to commit."
            exit 0
          fi
          git add exchange_rates.json || true
          git commit -m "feat: hourly RSS ${{ steps.rss.outputs.new_count }} new, ${{ steps.rss.outputs.filtered_count }} filtered for ${{ steps.rss.outputs.target_date }}"
          git pull --rebase origin main
          git push origin HEAD:main
