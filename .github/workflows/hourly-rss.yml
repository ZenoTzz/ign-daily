name: Hourly RSS

on:
  schedule:
    # GitHub may delay or drop schedules near the top of the hour.
    # Two staggered attempts keep the incremental feed current without duplicates.
    - cron: "17 * * * *"
    - cron: "47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ign-daily-write-main
  cancel-in-progress: false

jobs:
  rss:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update checkout to latest main
        run: git pull --ff-only origin main

      - name: Load automation config
        id: config
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          path = Path("data/automation-config.json")
          data = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}
          print(f"title_translator={data.get('title_translator', 'openclaw')}")
          print(f"fulltext_translator={data.get('fulltext_translator', 'openclaw')}")
          print(f"api_model={data.get('api_model', '')}")
          print(f"api_title_model={data.get('api_title_model', data.get('api_model', ''))}")
          print(f"api_title_thinking={data.get('api_title_thinking', 'disabled')}")
          print(f"api_base_url={data.get('api_base_url', '')}")
          PY

      - name: Run RSS incremental fetch
        id: rss
        env:
          IGN_DAILY_SKIP_GIT: "1"
        run: |
          set -euo pipefail
          python3 scripts/ign_rss_incremental.py --lookback-days 2
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          path = Path("ign_rss_new.json")
          if not path.exists():
              print("new_count=0")
              print("filtered_count=0")
              print("cleanup_count=0")
              print("changed_count=0")
              print("target_date=")
              raise SystemExit

          data = json.loads(path.read_text(encoding="utf-8-sig"))
          print(f"new_count={data.get('new_count', 0)}")
          print(f"filtered_count={data.get('filtered_count', 0)}")
          print(f"cleanup_count={data.get('cleanup_count', 0)}")
          print(f"changed_count={data.get('changed_count', data.get('new_count', 0))}")
          print(f"target_date={data.get('target_date', '')}")
          print(f"target_dates={','.join(data.get('target_dates') or [])}")
          print(f"changed_dates={','.join(data.get('changed_dates') or [])}")
          print(f"new_target_dates={','.join(data.get('new_target_dates') or [])}")
          pending_title_dates = []
          for date in data.get("target_dates") or []:
              queue_path = Path("data") / date / "need_titles.json"
              if queue_path.exists():
                  try:
                      queue = json.loads(queue_path.read_text(encoding="utf-8-sig"))
                  except Exception:
                      queue = []
                  if queue:
                      pending_title_dates.append(date)
          print(f"pending_title_dates={','.join(pending_title_dates)}")
          PY

      - name: Stop when there are no RSS changes
        if: steps.rss.outputs.changed_count == '0' && steps.rss.outputs.pending_title_dates == ''
        run: |
          rm -f ign_rss_new.json
          echo "No new RSS articles or filtered quarantine changes."

      - name: Validate RSS queue
        if: steps.rss.outputs.new_count != '0'
        run: |
          IFS=',' read -ra dates <<< "${{ steps.rss.outputs.new_target_dates }}"
          for date in "${dates[@]}"; do
            [ -z "$date" ] && continue
            python3 scripts/rss_queue_check.py "$date"
          done
          python3 scripts/agent_doctor.py

      - name: Cache clean article sources
        if: steps.rss.outputs.new_count != '0'
        run: |
          IFS=',' read -ra dates <<< "${{ steps.rss.outputs.new_target_dates }}"
          for date in "${dates[@]}"; do
            [ -z "$date" ] && continue
            python3 scripts/article_cache.py "$date" --missing --limit 20
          done
          python3 scripts/agent_doctor.py

      - name: Refresh exchange rates
        if: (steps.rss.outputs.new_count != '0' || steps.rss.outputs.pending_title_dates != '') && (steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek')
        run: |
          set -euo pipefail
          python3 scripts/fetch_exchange_rates.py

      - name: Snapshot DeepSeek balance before title translation
        if: (steps.rss.outputs.new_count != '0' || steps.rss.outputs.pending_title_dates != '') && (steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek')
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || secrets.GEMINI_API_KEY }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
        run: |
          python3 scripts/deepseek_balance.py --snapshot "${GITHUB_RUN_ID}-before" || true

      - name: Translate queued titles with DeepSeek
        if: (steps.rss.outputs.new_count != '0' || steps.rss.outputs.pending_title_dates != '') && (steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek')
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || secrets.GEMINI_API_KEY }}
          TRANSLATOR_MODEL: ${{ steps.config.outputs.api_title_model || steps.config.outputs.api_model || vars.TRANSLATOR_TITLE_MODEL || vars.TRANSLATOR_MODEL || vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          TRANSLATOR_TITLE_LIMIT: "30"
          TRANSLATOR_THINKING_MODE: ${{ steps.config.outputs.api_title_thinking }}
        run: |
          set -euo pipefail
          if [ -z "${TRANSLATOR_API_KEY:-}${GEMINI_API_KEY:-}${GOOGLE_API_KEY:-}" ]; then
            echo "title_translator=api but TRANSLATOR_API_KEY/DEEPSEEK_API_KEY/GEMINI_API_KEY is not set."
            exit 1
          fi
          IFS=',' read -ra dates <<< "${{ steps.rss.outputs.pending_title_dates }}"
          for date in "${dates[@]}"; do
            [ -z "$date" ] && continue
            python3 scripts/translate_titles_deepseek.py "$date"
          done
          python3 scripts/deepseek_balance.py --snapshot "${GITHUB_RUN_ID}-after" || true
          python3 scripts/record_deepseek_run_cost.py "${GITHUB_RUN_ID}" || true
          python3 scripts/agent_doctor.py

      - name: Commit and push RSS update
        if: steps.rss.outputs.changed_count != '0' || steps.rss.outputs.pending_title_dates != ''
        run: |
          set -euo pipefail
          git add data ign_rss_new.json exchange_rates.json
          if git diff --cached --quiet; then
            echo "No tracked RSS changes to commit."
            exit 0
          fi
          git commit -m "feat: hourly RSS ${{ steps.rss.outputs.new_count }} new, ${{ steps.rss.outputs.filtered_count }} filtered for ${{ steps.rss.outputs.changed_dates || steps.rss.outputs.target_date }}"
          for attempt in 1 2 3 4 5; do
            git pull --rebase -X theirs origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push race detected; retrying in $((attempt * 3)) seconds..."
            sleep $((attempt * 3))
          done
          echo "Failed to push RSS update after retries."
          exit 1
