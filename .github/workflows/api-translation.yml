name: API Translation

on:
  schedule:
    - cron: "20,50 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: api-translation-main
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Load automation config
        id: config
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          path = Path("data/automation-config.json")
          data = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}
          print(f"title_translator={data.get('title_translator', 'openclaw')}")
          print(f"fulltext_translator={data.get('fulltext_translator', 'openclaw')}")
          print(f"api_model={data.get('api_model', '')}")
          print(f"api_base_url={data.get('api_base_url', '')}")
          PY

      - name: Stop when API mode is disabled
        if: steps.config.outputs.title_translator != 'api' && steps.config.outputs.title_translator != 'deepseek' && steps.config.outputs.fulltext_translator != 'api' && steps.config.outputs.fulltext_translator != 'deepseek'
        run: echo "API translation disabled by data/automation-config.json."

      - name: Translate queued titles
        if: steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek'
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          TRANSLATOR_MODEL: ${{ steps.config.outputs.api_model || vars.TRANSLATOR_MODEL || vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
        run: |
          set -euo pipefail
          if [ -z "${TRANSLATOR_API_KEY:-}" ]; then
            echo "title_translator=api but TRANSLATOR_API_KEY/DEEPSEEK_API_KEY is not set."
            exit 1
          fi
          python3 scripts/translate_titles_deepseek.py --all

      - name: Translate requested full articles
        if: steps.config.outputs.fulltext_translator == 'api' || steps.config.outputs.fulltext_translator == 'deepseek'
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          TRANSLATOR_MODEL: ${{ steps.config.outputs.api_model || vars.TRANSLATOR_MODEL || vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          TRANSLATOR_FULLTEXT_LIMIT: "2"
          TRANSLATOR_FULLTEXT_MAX_TOKENS: "12000"
        run: |
          set -euo pipefail
          if [ -z "${TRANSLATOR_API_KEY:-}" ]; then
            echo "fulltext_translator=api but TRANSLATOR_API_KEY/DEEPSEEK_API_KEY is not set."
            exit 1
          fi
          python3 scripts/translate_fulltext_api.py --all

      - name: Validate repository
        if: steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek' || steps.config.outputs.fulltext_translator == 'api' || steps.config.outputs.fulltext_translator == 'deepseek'
        run: python3 scripts/agent_doctor.py

      - name: Commit and push API translation update
        if: steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek' || steps.config.outputs.fulltext_translator == 'api' || steps.config.outputs.fulltext_translator == 'deepseek'
        run: |
          set -euo pipefail
          git add data
          if git diff --cached --quiet; then
            echo "No API translation changes to commit."
            exit 0
          fi
          git commit -m "feat: apply API translation updates"
          git pull --rebase origin main
          git push origin HEAD:main
