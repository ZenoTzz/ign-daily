name: API Translation

on:
  schedule:
    - cron: "20,50 * * * *"
  workflow_dispatch:
    inputs:
      fulltext_limit:
        description: "Max fulltext articles for this run: 5, 10, or 999 for as many as possible"
        required: false
        default: "5"
      time_budget_seconds:
        description: "Fulltext translation time budget before graceful pause"
        required: false
        default: "1200"
      title_translator:
        description: "Manual run override for title translator: api/openclaw"
        required: false
        default: ""
      fulltext_translator:
        description: "Manual run override for fulltext translator: api/openclaw"
        required: false
        default: ""
      api_title_model:
        description: "Manual run title model override"
        required: false
        default: ""
      api_fulltext_model:
        description: "Manual run fulltext model override"
        required: false
        default: ""
      api_base_url:
        description: "Manual run API base URL override"
        required: false
        default: ""
      api_title_thinking:
        description: "Title thinking mode: disabled/high/max"
        required: false
        default: ""
      api_fulltext_thinking:
        description: "Fulltext thinking mode: disabled/high/max"
        required: false
        default: ""
      api_compare_thinking:
        description: "Comparison thinking mode: disabled/high/max"
        required: false
        default: ""
      manual_payload:
        description: "Advanced manual JSON payload"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: ign-daily-write-main
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update checkout to latest main
        run: git pull --ff-only origin main

      - name: Load automation config
        id: config
        env:
          MANUAL_TITLE_TRANSLATOR: ${{ github.event_name == 'workflow_dispatch' && inputs.title_translator || '' }}
          MANUAL_FULLTEXT_TRANSLATOR: ${{ github.event_name == 'workflow_dispatch' && inputs.fulltext_translator || '' }}
          MANUAL_API_TITLE_MODEL: ${{ github.event_name == 'workflow_dispatch' && inputs.api_title_model || '' }}
          MANUAL_API_FULLTEXT_MODEL: ${{ github.event_name == 'workflow_dispatch' && inputs.api_fulltext_model || '' }}
          MANUAL_API_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.api_base_url || '' }}
          MANUAL_API_TITLE_THINKING: ${{ github.event_name == 'workflow_dispatch' && inputs.api_title_thinking || '' }}
          MANUAL_API_FULLTEXT_THINKING: ${{ github.event_name == 'workflow_dispatch' && inputs.api_fulltext_thinking || '' }}
          MANUAL_API_COMPARE_THINKING: ${{ github.event_name == 'workflow_dispatch' && inputs.api_compare_thinking || '' }}
          MANUAL_PAYLOAD: ${{ github.event_name == 'workflow_dispatch' && inputs.manual_payload || '' }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path
          path = Path("data/automation-config.json")
          data = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}
          payload_raw = os.environ.get("MANUAL_PAYLOAD", "")
          try:
              payload = json.loads(payload_raw) if payload_raw else {}
          except Exception:
              payload = {}
          print(f"title_translator={os.environ.get('MANUAL_TITLE_TRANSLATOR') or data.get('title_translator', 'openclaw')}")
          print(f"fulltext_translator={os.environ.get('MANUAL_FULLTEXT_TRANSLATOR') or data.get('fulltext_translator', 'openclaw')}")
          print(f"nightly_learner={data.get('nightly_learner', 'openclaw')}")
          print(f"api_model={data.get('api_model', '')}")
          print(f"api_title_model={os.environ.get('MANUAL_API_TITLE_MODEL') or data.get('api_title_model', data.get('api_model', ''))}")
          print(f"api_fulltext_model={os.environ.get('MANUAL_API_FULLTEXT_MODEL') or data.get('api_fulltext_model', '')}")
          print(f"api_base_url={os.environ.get('MANUAL_API_BASE_URL') or data.get('api_base_url', '')}")
          print(f"api_title_base_url={payload.get('api_title_base_url') or os.environ.get('MANUAL_API_BASE_URL') or data.get('api_base_url', '')}")
          print(f"api_fulltext_base_url={payload.get('api_fulltext_base_url') or os.environ.get('MANUAL_API_BASE_URL') or data.get('api_base_url', '')}")
          print(f"api_title_thinking={os.environ.get('MANUAL_API_TITLE_THINKING') or data.get('api_title_thinking', 'disabled')}")
          print(f"api_fulltext_thinking={os.environ.get('MANUAL_API_FULLTEXT_THINKING') or data.get('api_fulltext_thinking', 'disabled')}")
          print(f"api_compare_thinking={payload.get('api_compare_thinking') or os.environ.get('MANUAL_API_COMPARE_THINKING') or data.get('api_compare_thinking', 'disabled')}")
          print(f"compare_date={payload.get('compare_date', '')}")
          print(f"compare_article_id={payload.get('compare_article_id', '')}")
          print(f"compare_models_json={json.dumps(payload.get('compare_models') or [], ensure_ascii=False)}")
          PY

      - name: Stop when API mode is disabled
        if: steps.config.outputs.compare_article_id == '' && steps.config.outputs.title_translator != 'api' && steps.config.outputs.title_translator != 'deepseek' && steps.config.outputs.fulltext_translator != 'api' && steps.config.outputs.fulltext_translator != 'deepseek'
        run: echo "API translation disabled by data/automation-config.json."

      - name: Refresh exchange rates
        if: steps.config.outputs.compare_article_id != '' || steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek' || steps.config.outputs.fulltext_translator == 'api' || steps.config.outputs.fulltext_translator == 'deepseek'
        run: |
          set -euo pipefail
          python3 scripts/fetch_exchange_rates.py || echo "WARN: exchange-rate refresh failed; translation will use fallback/local rates."

      - name: Snapshot DeepSeek balance before run
        if: steps.config.outputs.compare_article_id != '' || steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek' || steps.config.outputs.fulltext_translator == 'api' || steps.config.outputs.fulltext_translator == 'deepseek'
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
        run: |
          python3 scripts/deepseek_balance.py --snapshot "${GITHUB_RUN_ID}-before" || true

      - name: Translate one article twice for model comparison
        if: steps.config.outputs.compare_article_id != ''
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          TRANSLATOR_COMPARE_MODELS: ${{ steps.config.outputs.compare_models_json }}
          TRANSLATOR_COMPARE_MAX_TOKENS: "12000"
          TRANSLATOR_THINKING_MODE: ${{ steps.config.outputs.api_compare_thinking }}
        run: |
          set -euo pipefail
          if [ -z "${TRANSLATOR_API_KEY:-}" ]; then
            echo "comparison requested but TRANSLATOR_API_KEY/DEEPSEEK_API_KEY is not set."
            exit 1
          fi
          python3 scripts/article_cache.py "${{ steps.config.outputs.compare_date }}" --missing --limit 20
          python3 scripts/translate_compare_api.py "${{ steps.config.outputs.compare_date }}" "${{ steps.config.outputs.compare_article_id }}"
          python3 scripts/agent_doctor.py

      - name: Translate queued titles
        if: steps.config.outputs.compare_article_id == '' && (steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek')
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          TRANSLATOR_MODEL: ${{ steps.config.outputs.api_title_model || steps.config.outputs.api_model || vars.TRANSLATOR_TITLE_MODEL || vars.TRANSLATOR_MODEL || vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_title_base_url || steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          TRANSLATOR_TITLE_LIMIT: "30"
          TRANSLATOR_THINKING_MODE: ${{ steps.config.outputs.api_title_thinking }}
        run: |
          set -euo pipefail
          if [ -z "${TRANSLATOR_API_KEY:-}" ]; then
            echo "title_translator=api but TRANSLATOR_API_KEY/DEEPSEEK_API_KEY is not set."
            exit 1
          fi
          python3 scripts/article_cache.py --all --queued --missing --limit 30
          python3 scripts/translate_titles_deepseek.py --all

      - name: Translate requested full articles
        if: steps.config.outputs.compare_article_id == '' && (steps.config.outputs.fulltext_translator == 'api' || steps.config.outputs.fulltext_translator == 'deepseek')
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          TRANSLATOR_MODEL: ${{ steps.config.outputs.api_fulltext_model || vars.TRANSLATOR_FULLTEXT_MODEL || steps.config.outputs.api_model || vars.TRANSLATOR_MODEL || vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_fulltext_base_url || steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          TRANSLATOR_FULLTEXT_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.fulltext_limit || '5' }}
          TRANSLATOR_FULLTEXT_TIME_BUDGET_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.time_budget_seconds || '1200' }}
          TRANSLATOR_FULLTEXT_MAX_TOKENS: "12000"
          TRANSLATOR_THINKING_MODE: ${{ steps.config.outputs.api_fulltext_thinking }}
        run: |
          set -euo pipefail
          if [ -z "${TRANSLATOR_API_KEY:-}" ]; then
            echo "fulltext_translator=api but TRANSLATOR_API_KEY/DEEPSEEK_API_KEY is not set."
            exit 1
          fi
          python3 scripts/article_cache.py --all --queued --missing --limit "${TRANSLATOR_FULLTEXT_LIMIT}"
          python3 scripts/translate_fulltext_api.py --all

      - name: Validate repository
        if: steps.config.outputs.compare_article_id != '' || steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek' || steps.config.outputs.fulltext_translator == 'api' || steps.config.outputs.fulltext_translator == 'deepseek'
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
        run: |
          python3 scripts/deepseek_balance.py --snapshot "${GITHUB_RUN_ID}-after" || true
          python3 scripts/record_deepseek_run_cost.py "${GITHUB_RUN_ID}" || true
          python3 scripts/agent_doctor.py

      - name: Commit and push API translation update
        if: steps.config.outputs.compare_article_id != '' || steps.config.outputs.title_translator == 'api' || steps.config.outputs.title_translator == 'deepseek' || steps.config.outputs.fulltext_translator == 'api' || steps.config.outputs.fulltext_translator == 'deepseek'
        run: |
          set -euo pipefail
          git add data
          if git diff --cached --quiet; then
            echo "No API translation changes to commit."
            exit 0
          fi
          git add exchange_rates.json || true
          git commit -m "feat: apply API translation updates"
          git pull --rebase -X theirs origin main
          git push origin HEAD:main
