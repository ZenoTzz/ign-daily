name: Nightly Style Learning

on:
  schedule:
    - cron: "30 14 * * *" # 22:30 Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-style-main
  cancel-in-progress: false

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Load automation config
        id: config
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          path = Path("data/automation-config.json")
          data = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}
          print(f"nightly_learner={data.get('nightly_learner', 'openclaw')}")
          print(f"api_model={data.get('api_model', '')}")
          print(f"api_nightly_model={data.get('api_nightly_model', data.get('api_model', ''))}")
          print(f"api_base_url={data.get('api_base_url', '')}")
          PY

      - name: Stop when API nightly learning is disabled
        if: steps.config.outputs.nightly_learner != 'api' && steps.config.outputs.nightly_learner != 'deepseek'
        run: echo "Nightly style learning is owned by OpenClaw."

      - name: Run API nightly style learning
        if: steps.config.outputs.nightly_learner == 'api' || steps.config.outputs.nightly_learner == 'deepseek'
        env:
          TRANSLATOR_API_KEY: ${{ secrets.TRANSLATOR_API_KEY || secrets.DEEPSEEK_API_KEY }}
          NIGHTLY_STYLE_MODEL: ${{ steps.config.outputs.api_nightly_model || steps.config.outputs.api_model || vars.NIGHTLY_STYLE_MODEL || vars.TRANSLATOR_MODEL || vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          TRANSLATOR_BASE_URL: ${{ steps.config.outputs.api_base_url || vars.TRANSLATOR_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
        run: |
          set -euo pipefail
          if [ -z "${TRANSLATOR_API_KEY:-}" ]; then
            echo "nightly_learner=api but TRANSLATOR_API_KEY/DEEPSEEK_API_KEY is not set."
            exit 1
          fi
          python3 scripts/nightly_style_api.py
          python3 scripts/agent_doctor.py

      - name: Commit and push nightly style update
        if: steps.config.outputs.nightly_learner == 'api' || steps.config.outputs.nightly_learner == 'deepseek'
        run: |
          set -euo pipefail
          git add STYLE_PROFILE.md data/learning_log
          if git diff --cached --quiet; then
            echo "No nightly style changes to commit."
            exit 0
          fi
          git commit -m "chore: update nightly style profile"
          git pull --rebase origin main
          git push origin HEAD:main
