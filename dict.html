<!doctype html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>词库工作台 — IGN Daily</title>
  <link rel="stylesheet" href="assets/style.css?v=20260713dict2">
  <link rel="stylesheet" href="assets/dict-workbench.css?v=20260713dict2">
  <script src="assets/app.js?v=20260721cookieauth1"></script>
  <script defer src="assets/alpine.min.js"></script>
</head>
<body class="dict-page">
  <div x-data="dictWorkbench()" x-init="init()" x-cloak>
    <header class="dict-topbar">
      <a class="dict-brand" href="index.html"><span class="ign-mark">IGN</span><span>IGN Daily</span></a>
      <div class="dict-top-actions"><span class="save-state" x-text="saveState"></span></div>
    </header>

    <main class="dict-shell">
      <section class="dict-hero">
        <div><p class="eyebrow">TRANSLATION MEMORY</p><h1>词库工作台</h1><p>先搜索，再编辑；新译名先进入候选审核，不会直接污染正式词库。</p></div>
        <button class="primary-action" @click="openCandidate()">＋ 提交候选</button>
      </section>

      <section class="search-panel">
        <label class="main-search"><span>⌕</span><input x-ref="search" x-model.debounce.150ms="query" @input="page=0" placeholder="搜索英文、中文或备注…"><kbd>⌘ K</kbd></label>
        <nav class="view-tabs" aria-label="词库视图">
          <button @click="view='official'" :class="{active:view==='official'}">正式词库 <b x-text="entries.length"></b></button>
          <button @click="view='pending'" :class="{active:view==='pending'}">待审核 <b x-text="pending.length"></b></button>
          <button @click="view='conflicts'" :class="{active:view==='conflicts'}">冲突 <b x-text="conflicts.length"></b></button>
          <button @click="view='insights'" :class="{active:view==='insights'}">词库概览</button>
        </nav>
      </section>

      <div class="category-row" x-show="view==='official'">
        <template x-for="cat in categories" :key="cat.key"><button @click="category=cat.key;page=0" :class="{active:category===cat.key}"><span x-text="cat.label"></span><b x-text="cat.count"></b></button></template>
      </div>

      <section class="dict-content" x-show="view==='official'">
        <div class="term-table">
          <div class="table-head"><span>英文原名</span><span>标准译名</span><span>分类 / 来源</span><span></span></div>
          <template x-for="entry in pagedEntries" :key="entry.key"><button class="term-row" @click="selectEntry(entry)"><span class="term-en" x-text="entry.en"></span><span class="term-cn" x-text="entry.cn"></span><span class="term-meta"><i x-text="categoryLabel(entry.category)"></i><small x-text="sourceLabel(entry.source)"></small></span><span class="row-arrow">›</span></button></template>
          <div class="empty-panel" x-show="!loading && !filteredEntries.length">没有找到匹配词条。可以直接提交为候选。</div>
          <div class="loading-panel" x-show="loading">正在加载词库…</div>
          <footer class="pager" x-show="filteredEntries.length"><span>显示 <b x-text="pageStart"></b>–<b x-text="pageEnd"></b>，共 <b x-text="filteredEntries.length"></b> 条</span><div><button @click="page=Math.max(0,page-1)" :disabled="page===0">←</button><button @click="page=Math.min(pageCount-1,page+1)" :disabled="page>=pageCount-1">→</button></div></footer>
        </div>
      </section>

      <section class="review-grid" x-show="view==='pending' || view==='conflicts'">
        <template x-for="item in (view==='conflicts'?conflicts:filteredCandidates)" :key="item.id"><article class="candidate-card" :class="{conflict:item.has_conflict}"><div><span class="status-chip" x-text="item.has_conflict?'与正式词库冲突':'待审核'"></span><h3 x-text="item.en"></h3><p><strong x-text="item.cn"></strong><span x-text="categoryLabel(item.category)"></span></p><small x-text="item.note || '无备注'"></small><div class="conflict-copy" x-show="item.official_matches?.length">正式词库：<span x-text="item.official_matches?.map(x=>x.cn).join(' / ')"></span></div></div><div class="candidate-actions"><button @click="rejectCandidate(item)">驳回</button><button class="approve" @click="reviewCandidate(item)">检查并采纳</button></div></article></template>
        <div class="empty-panel" x-show="!(view==='conflicts'?conflicts:filteredCandidates).length">这里暂时没有内容。</div>
      </section>

      <section class="insights" x-show="view==='insights'">
        <div class="stat-grid"><div><b x-text="entries.length"></b><span>正式词条</span></div><div><b x-text="pending.length"></b><span>待审核</span></div><div><b x-text="conflicts.length"></b><span>待处理冲突</span></div><div><b x-text="sourceCounts.user||0"></b><span>人工确认</span></div></div>
        <article class="cloud-card"><div><h2>词库分布</h2><p>词云仅用于快速观察分类规模，不代替搜索和审核。</p></div><div class="word-cloud"><template x-for="cat in categories.filter(x=>x.key!=='all')" :key="cat.key"><button @click="category=cat.key;view='official'" :style="`font-size:${cloudSize(cat.count)}px`"><span x-text="cat.label"></span><small x-text="cat.count"></small></button></template></div></article>
      </section>
    </main>

    <div class="drawer-backdrop" x-show="drawer" @click.self="closeDrawer()" @keydown.escape.window="closeDrawer()">
      <aside class="detail-drawer">
        <button class="drawer-close" @click="closeDrawer()">×</button>
        <template x-if="drawer==='entry'"><form @submit.prevent="saveEntry()"><p class="eyebrow">OFFICIAL TERM</p><h2 x-text="form.en"></h2><label>标准译名<input x-model="form.cn" required></label><label>分类<select x-model="form.category"><template x-for="cat in categoryKeys"><option :value="cat" x-text="categoryLabel(cat)"></option></template></select></label><label>来源<select x-model="form.source"><option value="user">人工确认</option><option value="ign_cn">IGN 中国</option><option value="bilibili">IGN B站</option><option value="consensus">通行译名</option><option value="ai_guess">AI 待核实</option></select></label><label>备注<textarea x-model="form.note" rows="4" placeholder="可记录命名依据"></textarea></label><button class="drawer-primary" :disabled="saving">保存修改</button></form></template>
        <template x-if="drawer==='candidate'"><form @submit.prevent="submitCandidate()"><p class="eyebrow">NEW CANDIDATE</p><h2>提交新译名</h2><p class="drawer-help">候选通过审核后才会进入正式词库。</p><label>英文原名<input x-model="form.en" @input="checkDuplicate()" required placeholder="例如 Death Stranding 2"></label><div class="duplicate-warning" x-show="duplicate"><b>已存在相似词条</b><span x-text="duplicate?.en+' → '+duplicate?.cn"></span></div><label>建议译名<input x-model="form.cn" required placeholder="例如 死亡搁浅2"></label><label>分类<select x-model="form.category"><template x-for="cat in categoryKeys"><option :value="cat" x-text="categoryLabel(cat)"></option></template></select></label><label>备注<textarea x-model="form.note" rows="4" placeholder="来源、上下文或采用理由（可选）"></textarea></label><button class="drawer-primary" :disabled="saving">提交候选</button></form></template>
        <template x-if="drawer==='review'"><form @submit.prevent="approveCandidate()"><p class="eyebrow">REVIEW CANDIDATE</p><h2 x-text="form.en"></h2><label>采纳译名<input x-model="form.cn" required></label><label>分类<select x-model="form.category"><template x-for="cat in categoryKeys"><option :value="cat" x-text="categoryLabel(cat)"></option></template></select></label><label>审核备注<textarea x-model="form.note" rows="4"></textarea></label><div class="duplicate-warning" x-show="selectedCandidate?.official_matches?.length"><b>当前正式译名</b><span x-text="selectedCandidate?.official_matches?.map(x=>x.cn).join(' / ')"></span></div><button class="drawer-primary" :disabled="saving">确认采纳</button></form></template>
      </aside>
    </div>
    <div class="dict-toast" x-show="toast" x-transition x-text="toast"></div>
  </div>
  <script src="assets/dict-workbench.js?v=20260713dict2"></script>
</body>
</html>
