<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>词库 — IGN Daily</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="assets/style.css?v=20260616theme2">
  <script src="assets/app.js?v=20260624serverauth1"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 600:'#a01620',700:'#7e1219' }}}}}
  </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div x-data="dictData()" x-init="init()" class="min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-10">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <a href="index.html" class="text-slate-500 hover:text-brand-600">←</a>
          <h1 class="text-lg font-bold">📖 词库管理</h1>
          <span class="text-xs text-slate-400" x-show="data" x-text="`v ${data?._meta?.last_updated}`"></span>
        </div>
        <div class="flex items-center gap-2">
          <button @click="window.appTheme.toggleTheme()" class="text-slate-500 hover:text-brand-600 text-sm" title="主题切换">🌗</button>
          <span x-show="changedKeys.length > 0" class="text-xs text-amber-600">
            <span x-text="changedKeys.length"></span> 项待保存
          </span>
          <button @click="saveAll()" :disabled="changedKeys.length === 0"
            class="px-3 py-1.5 bg-brand-600 text-white rounded-lg disabled:bg-slate-300 text-xs sm:text-sm">
            💾 保存
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-4">
      <!-- Search + filter -->
      <div class="bg-white rounded-xl border p-3 mb-4 flex flex-col sm:flex-row gap-2">
        <input type="text" x-model="search" placeholder="🔍 搜索英文/中文..."
          class="flex-1 px-3 py-2 border rounded-lg text-sm">
        <div class="flex gap-2 overflow-x-auto">
          <template x-for="cat in categories" :key="cat.key">
            <button @click="filterCat = cat.key"
              :class="filterCat === cat.key ? 'bg-brand-600 text-white' : 'bg-slate-100 text-slate-700'"
              class="px-3 py-1.5 rounded-lg text-xs whitespace-nowrap">
              <span x-text="cat.label"></span>
              <span class="ml-1 opacity-70" x-text="`(${cat.count})`"></span>
            </button>
          </template>
        </div>
      </div>

      <!-- Source filter -->
      <div class="flex gap-1 mb-3 text-xs flex-wrap">
        <span class="text-slate-500">来源：</span>
        <template x-for="src in ['all','user','ign_cn','bilibili','consensus','ai_guess']">
          <button @click="filterSource = src"
            :class="filterSource === src ? 'bg-slate-700 text-white' : 'bg-slate-100 text-slate-600'"
            class="px-2 py-0.5 rounded">
            <span x-text="src"></span>
          </button>
        </template>
      </div>

      <!-- Loading -->
      <div x-show="!data" class="text-center py-12 text-slate-400">加载中...</div>

      <!-- Table -->
      <div x-show="data" class="bg-white rounded-xl border overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-xs text-slate-500 uppercase">
            <tr>
              <th class="text-left px-3 py-2 w-1/3">英文</th>
              <th class="text-left px-3 py-2 w-1/3">中文</th>
              <th class="text-left px-3 py-2 w-24">来源</th>
              <th class="text-left px-3 py-2 w-24">分类</th>
              <th class="px-3 py-2 w-12"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="entry in pagedEntries" :key="entry.key">
              <tr class="dict-row border-t" :class="changedKeys.includes(entry.key) ? 'changed' : ''">
                <td class="font-mono text-xs sm:text-sm" x-text="entry.en"></td>
                <td>
                  <input type="text" class="dict-input" :value="entry.cn"
                    @input="updateCn(entry, $event.target.value)">
                </td>
                <td>
                  <select class="dict-input text-xs" :value="entry.source"
                    @change="updateSource(entry, $event.target.value)">
                    <option value="user">user</option>
                    <option value="ign_cn">ign_cn</option>
                    <option value="bilibili">bilibili</option>
                    <option value="consensus">consensus</option>
                    <option value="ai_guess">ai_guess</option>
                  </select>
                </td>
                <td>
                  <select class="dict-input text-xs" :value="entry.cat"
                    @change="moveEntry(entry, $event.target.value)">
                    <template x-for="cat in ['games','movies_tv','companies','people','media','terms']" :key="cat">
                      <option :value="cat" :selected="cat === entry.cat" x-text="cat"></option>
                    </template>
                  </select>
                </td>
                <td>
                  <button @click="removeEntry(entry)" class="text-red-500 hover:text-red-700 text-sm" title="删除">🗑️</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
        <!-- Pagination -->
        <div class="flex items-center justify-between p-3 border-t text-xs text-slate-500">
          <span>共 <span x-text="filteredEntries.length"></span> 条 / 总 <span x-text="allEntries.length"></span> 条</span>
          <div class="flex items-center gap-2">
            <button @click="page = Math.max(0, page - 1)" :disabled="page === 0"
              class="px-2 py-1 border rounded disabled:opacity-30">←</button>
            <span x-text="`${page + 1} / ${Math.ceil(filteredEntries.length / pageSize) || 1}`"></span>
            <button @click="page = Math.min(Math.ceil(filteredEntries.length / pageSize) - 1, page + 1)"
              :disabled="(page + 1) * pageSize >= filteredEntries.length"
              class="px-2 py-1 border rounded disabled:opacity-30">→</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Toast -->
    <div x-show="toast" x-cloak x-transition.opacity
         class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-30"
         x-text="toast"></div>

    <!-- 译文同步预览弹窗 -->
    <div x-show="showSyncDialog" x-cloak
         @keydown.escape.window="showSyncDialog=false"
         class="fixed inset-0 bg-black/50 flex items-center justify-center z-40 p-4"
         @click.self="showSyncDialog=false">
      <div class="bg-white rounded-xl max-w-3xl w-full max-h-[85vh] flex flex-col">
        <div class="p-4 border-b">
          <h2 class="text-base font-bold mb-1">🔄 词库已保存，是否同步译文？</h2>
          <p class="text-xs text-slate-500">以下是检测到的需要替换的位置，勾选后点「同步选中项」。</p>
        </div>
        <div class="p-3 flex-1 overflow-y-auto space-y-3">
          <div x-show="syncImpact.length === 0" class="text-center text-slate-400 py-6">
            未在译文中检测到需要同步的内容。
          </div>
          <template x-for="(impact, idx) in syncImpact" :key="`${impact.articleId}-${impact.en}-${idx}`">
            <div class="border rounded-lg p-2">
              <div class="flex items-start gap-2">
                <input type="checkbox" x-model="impact.selected" class="mt-1">
                <div class="flex-1 min-w-0">
                  <div class="text-xs text-slate-500 mb-1">
                    文章 <span class="font-mono" x-text="`#${impact.articleId}`"></span>
                    | 词条 <span class="font-semibold" x-text="impact.en"></span>
                    → <span class="text-green-700" x-text="impact.newCn"></span>
                    <span x-show="impact.oldCn" class="text-slate-400">（原：<span x-text="impact.oldCn"></span>）</span>
                  </div>
                  <div class="text-xs space-y-1">
                    <template x-for="(loc, j) in impact.locations" :key="j">
                      <div class="bg-slate-50 rounded p-1.5">
                        <div class="text-slate-400 text-[10px] mb-0.5">段落 <span x-text="loc.paraIdx + 1"></span>:</div>
                        <div x-html="loc.preview"></div>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
        <div class="p-3 border-t flex justify-between items-center bg-slate-50">
          <div class="flex gap-2 text-xs">
            <button @click="toggleAllSync(true)" class="text-slate-600 hover:text-brand-600">全选</button>
            <button @click="toggleAllSync(false)" class="text-slate-600 hover:text-brand-600">全不选</button>
            <span class="text-slate-400" x-text="`已选 ${selectedSyncCount} 项`"></span>
          </div>
          <div class="flex gap-2">
            <button @click="showSyncDialog=false" class="px-3 py-1.5 text-slate-500 text-sm">取消（不同步）</button>
            <button @click="applySyncToTranslations()" :disabled="selectedSyncCount === 0 || syncSaving"
              class="px-3 py-1.5 bg-brand-600 text-white rounded-lg text-sm disabled:bg-slate-300">
              <span x-show="!syncSaving">同步选中项 (<span x-text="selectedSyncCount"></span>)</span>
              <span x-show="syncSaving">同步中...</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function dictData() {
      return {
        data: null,
        originalData: null,
        search: '',
        filterCat: 'all',
        filterSource: 'all',
        page: 0,
        pageSize: 50,
        changedKeys: [],  // 形如 'games::Final Fantasy Tactics'
        toast: '',

        // 译文同步模式
        showSyncDialog: false,
        syncImpact: [],  // [{ articleId, en, newCn, oldCn, locations: [{paraIdx, preview}], selected }]
        syncSaving: false,
        pendingChanges: [],  // 保存词库后的变更详情

        async init() {
          try {
            const res = await fetch(`data/dict.json?t=${Date.now()}`);
            this.data = await res.json();
            this.originalData = JSON.parse(JSON.stringify(this.data));
          } catch (e) {
            console.error(e);
          }
        },

        get categories() {
          if (!this.data) return [];
          const cats = ['games','movies_tv','companies','people','media','terms'];
          const counts = { all: 0 };
          for (const c of cats) {
            const n = Object.keys(this.data[c] || {}).length;
            counts[c] = n;
            counts.all += n;
          }
          const labels = { all:'全部', games:'游戏', movies_tv:'影视', companies:'公司', people:'人物', media:'媒体', terms:'术语' };
          return [
            { key: 'all', label: labels.all, count: counts.all },
            ...cats.filter(c => counts[c]).map(c => ({ key: c, label: labels[c], count: counts[c] }))
          ];
        },

        get allEntries() {
          if (!this.data) return [];
          const cats = ['games','movies_tv','companies','people','media','terms'];
          const list = [];
          for (const c of cats) {
            for (const [en, info] of Object.entries(this.data[c] || {})) {
              list.push({
                key: `${c}::${en}`,
                en, cat: c,
                cn: info?.cn || '',
                source: info?.source || ''
              });
            }
          }
          return list;
        },

        get filteredEntries() {
          let list = this.allEntries;
          if (this.filterCat !== 'all') list = list.filter(e => e.cat === this.filterCat);
          if (this.filterSource !== 'all') list = list.filter(e => e.source === this.filterSource);
          if (this.search.trim()) {
            const q = this.search.trim().toLowerCase();
            list = list.filter(e => e.en.toLowerCase().includes(q) || e.cn.includes(this.search.trim()));
          }
          return list;
        },

        get pagedEntries() {
          const start = this.page * this.pageSize;
          return this.filteredEntries.slice(start, start + this.pageSize);
        },

        markChanged(key) {
          if (!this.changedKeys.includes(key)) this.changedKeys.push(key);
        },

        updateCn(entry, val) {
          this.data[entry.cat][entry.en].cn = val;
          this.markChanged(entry.key);
        },

        updateSource(entry, val) {
          this.data[entry.cat][entry.en].source = val;
          this.markChanged(entry.key);
        },

        moveEntry(entry, newCat) {
          if (!newCat || newCat === entry.cat) return;
          if (!this.data[newCat]) this.data[newCat] = {};
          const value = this.data[entry.cat][entry.en];
          delete this.data[entry.cat][entry.en];
          this.data[newCat][entry.en] = value;
          this.markChanged(entry.key);
          this.markChanged(`${newCat}::${entry.en}`);
          this.page = 0;
        },

        removeEntry(entry) {
          if (!confirm(`确定删除 "${entry.en}"？`)) return;
          delete this.data[entry.cat][entry.en];
          this.markChanged(entry.key);
        },

        async saveAll() {
          if (this.changedKeys.length === 0) return;
          // 1. 记录变更详情（后续扫描译文要用）
          this.pendingChanges = this.changedKeys.map(key => {
            const [cat, en] = key.split('::');
            const newEntry = this.data[cat]?.[en];
            const oldEntry = this.originalData[cat]?.[en];
            return {
              key, cat, en,
              newCn: newEntry?.cn || null,  // null = 被删除
              oldCn: oldEntry?.cn || ''
            };
          });
          // 2. 保存词库
          try {
            const today = new Date().toISOString().slice(0, 10);
            this.data._meta.last_updated = today;
            const json = JSON.stringify(this.data, null, 2);
            await GH.putFile('data/dict.json', json,
              `update dict: ${this.changedKeys.length} entries (${today})`);
            this.flash(`✅ 词库已保存 ${this.changedKeys.length} 项变更，扫描译文中...`);
            this.changedKeys = [];
            this.originalData = JSON.parse(JSON.stringify(this.data));
            // 3. 扫描译文查看是否需要同步
            await this.scanTranslationImpact();
          } catch (e) {
            this.flash('❌ 保存失败：' + e.message, 4000);
          }
        },

        async scanTranslationImpact() {
          // 扫描所有日期下的译文（仅今日+最近7天，避免量过大）
          this.flash('🔍 扫描译文中...');
          try {
            const histRes = await fetch(`data/index-list.json?t=${Date.now()}`);
            const hist = histRes.ok ? await histRes.json() : [];
            const recent = hist.slice(0, 7);  // 只扫近7天

            const impacts = [];
            for (const day of recent) {
              const date = day.date;
              try {
                const idxRes = await fetch(`data/${date}/index.json?t=${Date.now()}`);
                if (!idxRes.ok) continue;
                const dayIdx = await idxRes.json();
                const translated = dayIdx.articles.filter(a => a.translation_status === 'done');
                // 并发拉取当日译文
                await Promise.all(translated.map(async (a) => {
                  const padded = String(a.id).padStart(2, '0');
                  const trRes = await fetch(`data/${date}/translations/${padded}.json?t=${Date.now()}`);
                  if (!trRes.ok) return;
                  const tr = await trRes.json();
                  for (const change of this.pendingChanges) {
                    if (!change.newCn) continue;  // 删除不同步
                    if (change.newCn === change.oldCn) continue;  // 译名没变
                    const impact = this.findInArticle(tr, change, date, a.id);
                    if (impact) impacts.push(impact);
                  }
                }));
              } catch (_) {}
            }

            this.pendingChanges = [];
            if (impacts.length === 0) {
              this.flash(`✅ 译文中未检测到需同步的内容`);
              return;
            }
            this.syncImpact = impacts;
            this.showSyncDialog = true;
          } catch (e) {
            console.error(e);
            this.flash('❌ 扫描失败：' + e.message, 4000);
          }
        },

        findInArticle(tr, change, date, articleId) {
          // 在译文的 paragraphs[].cn 或 paragraphs[].en 里查找 原oldCn 或 en 出现位置
          const locations = [];
          const oldCn = change.oldCn;
          const en = change.en;
          const newCn = change.newCn;
          if (!Array.isArray(tr.paragraphs)) return null;

          for (let i = 0; i < tr.paragraphs.length; i++) {
            const p = tr.paragraphs[i];
            const cn = p.cn || '';
            // 优先查找原中文译名（如果有）
            let matched = false;
            let preview = '';
            if (oldCn && oldCn !== newCn && cn.includes(oldCn)) {
              matched = true;
              preview = this.makePreview(cn, oldCn, newCn);
            } else if (cn.includes(en) && !cn.includes(newCn)) {
              // 译文里还在用英文（没被译）→ 可选同步为中文
              matched = true;
              preview = this.makePreview(cn, en, newCn);
            }
            if (matched) {
              locations.push({ paraIdx: i, preview });
            }
          }
          if (locations.length === 0) return null;
          return {
            articleId, date, en,
            newCn, oldCn,
            locations,
            selected: true,
          };
        },

        makePreview(text, oldStr, newStr) {
          // 生成高亮预览：oldStr 标红删除线，newStr 标绿下划线
          const idx = text.indexOf(oldStr);
          if (idx < 0) return this.escapeHtml(text);
          const start = Math.max(0, idx - 30);
          const end = Math.min(text.length, idx + oldStr.length + 30);
          const before = (start > 0 ? '…' : '') + this.escapeHtml(text.slice(start, idx));
          const oldHtml = `<span class="bg-red-100 line-through text-red-700">${this.escapeHtml(oldStr)}</span>`;
          const newHtml = `<span class="bg-green-100 text-green-700">${this.escapeHtml(newStr)}</span>`;
          const after = this.escapeHtml(text.slice(idx + oldStr.length, end)) + (end < text.length ? '…' : '');
          return before + oldHtml + newHtml + after;
        },

        escapeHtml(s) {
          return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        },

        get selectedSyncCount() {
          return this.syncImpact.filter(x => x.selected).length;
        },

        toggleAllSync(val) {
          for (const i of this.syncImpact) i.selected = val;
        },

        async applySyncToTranslations() {
          const selected = this.syncImpact.filter(x => x.selected);
          if (selected.length === 0) return;
          this.syncSaving = true;
          try {
            // 按 articleId+date 分组
            const groups = {};
            for (const it of selected) {
              const key = `${it.date}::${it.articleId}`;
              if (!groups[key]) groups[key] = { date: it.date, articleId: it.articleId, items: [] };
              groups[key].items.push(it);
            }

            // 逐个文章更新
            for (const g of Object.values(groups)) {
              const padded = String(g.articleId).padStart(2, '0');
              const path = `data/${g.date}/translations/${padded}.json`;
              const fresh = await GH.getFile(path);
              const tr = JSON.parse(fresh.content);
              for (const it of g.items) {
                for (const loc of it.locations) {
                  const p = tr.paragraphs[loc.paraIdx];
                  if (!p) continue;
                  const cn = p.cn || '';
                  if (it.oldCn && it.oldCn !== it.newCn && cn.includes(it.oldCn)) {
                    p.cn = cn.replaceAll(it.oldCn, it.newCn);
                  } else if (cn.includes(it.en) && !cn.includes(it.newCn)) {
                    p.cn = cn.replaceAll(it.en, it.newCn);
                  }
                }
              }
              await GH.putFile(path, JSON.stringify(tr, null, 2),
                `sync dict: update #${g.articleId} (${g.items.length} entries)`);
            }
            this.flash(`✅ 已同步 ${selected.length} 项到 ${Object.keys(groups).length} 篇译文`);
            this.showSyncDialog = false;
            this.syncImpact = [];
          } catch (e) {
            this.flash('❌ 同步失败：' + e.message, 5000);
          } finally {
            this.syncSaving = false;
          }
        },

        flash(msg, ms = 2500) {
          this.toast = msg;
          setTimeout(() => { this.toast = ''; }, ms);
        }
      }
    }
  </script>
</body>
</html>
