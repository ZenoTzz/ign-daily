<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ef4444">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <title>译文 — IGN Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="assets/alpine.min.js"></script>
  <link rel="stylesheet" href="assets/style.css?v=20260602m">
  <link rel="stylesheet" href="assets/article-dark.css?v=20260602m">
  <script src="assets/app.js?v=20260606datefix"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 600:'#a01620',700:'#7e1219' }}}}
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div x-data="articleData()" x-init="init()" class="h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b shrink-0">
      <div class="px-4 py-2 flex items-center justify-between">
        <div class="flex items-center gap-3 min-w-0">
          <a href="index.html" class="text-slate-500 hover:text-brand-600 shrink-0">← 返回</a>
          <h1 class="font-semibold text-sm sm:text-base truncate" x-text="article?.cn_title || '加载中...'"></h1>
        </div>
        <div class="article-header-actions flex items-center gap-2 shrink-0">
          <!-- 桌面端以下不显示原文视图：手机只保留中文译文 -->
          <select x-model="viewMode" class="hidden text-xs px-2 py-1 rounded border">
            <option value="cn">中文</option>
            <option value="en">原文</option>
            <option value="both">双语</option>
          </select>
          <!-- 桌面端显示所有按钮 -->
          <a x-show="article?.url" :href="article?.url" target="_blank" rel="noopener"
            class="hidden lg:inline text-xs text-slate-500 hover:text-brand-600">🔗 IGN</a>
          <button @click="toggleTheme()" class="article-desktop-action text-xs text-slate-500 hover:text-brand-600" title="主题切换">
            <span x-text="themeIcon"></span>
          </button>
          <button @click="mode = mode === 'compare' ? 'cn' : 'compare'"
            class="hidden lg:inline-flex text-xs px-2 py-1 rounded border hover:bg-slate-50">
            <span x-text="mode === 'compare' ? '🔄 切换' : '↔ 对照'"></span>
          </button>
          <button @click="openPolish()"
            class="article-desktop-action text-xs px-2 py-1 rounded bg-amber-100 text-amber-800 hover:bg-amber-200 border border-amber-300">
            <span x-text="polishStatus"></span>
          </button>
          <button @click="reapplyDict()"
            class="article-desktop-action text-xs px-2 py-1 rounded bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-200"
            title="按最新词库重新扫描译文、替换中文名">
            🔄 重新应用词库
          </button>
          <button x-show="needsManualReview()" @click="approveManualReview()"
            class="article-desktop-action text-xs px-2 py-1 rounded bg-red-50 text-red-700 hover:bg-red-100 border border-red-200"
            title="确认这篇草稿可作为正式译文发布">
            ✅ 人工放行
          </button>
          <button @click="copyArticle()"
            class="article-desktop-action text-xs px-2 py-1 rounded bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200"
            title="复制中文全文（自动全角标点，去 markdown）">
            <span x-text="copyBtnText"></span>
          </button>
          <button @click="document.querySelector('.fab-btn')?.click()"
            class="article-mobile-more text-xs px-2 py-1 rounded border" title="更多操作">
            ⋯
          </button>
        </div>
      </div>
    </header>

    <!-- Mobile FAB for article page -->
    <div class="sm:hidden fixed bottom-6 right-4 z-40" x-data="{ fabOpen: false }">
      <div x-show="fabOpen" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-90" x-transition:enter-end="opacity-100 scale-100" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-90"
           class="mb-3 flex flex-col gap-2 items-end">
        <a x-show="false" :href="article?.url" target="_blank" rel="noopener" class="fab-item">
          🔗 IGN 原文
        </a>
        <button @click="openPolish(); fabOpen=false" class="fab-item hidden">
          <span x-text="polishStatus"></span>
        </button>
        <button @click="reapplyDict(); fabOpen=false" class="fab-item">
          🔄 重新应用词库
        </button>
        <button x-show="needsManualReview()" @click="approveManualReview(); fabOpen=false" class="fab-item">
          ✅ 人工放行
        </button>
        <button @click="copyArticle(); fabOpen=false" class="fab-item">
          <span x-text="copyBtnText"></span>
        </button>
        <button @click="toggleTheme(); fabOpen=false" class="fab-item">
          <span x-text="themeIcon"></span> 主题
        </button>
      </div>
      <button @click="fabOpen = !fabOpen" @click.away="fabOpen = false"
              class="fab-btn" :class="fabOpen ? 'fab-open' : ''">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div x-show="error" class="p-6 text-red-600" x-text="error"></div>

    <div x-show="needsManualReview()" x-cloak class="manual-review-banner">
      <div>
        <strong>这篇是 API 质检未通过的草稿</strong>
        <p x-text="manualReviewReason()"></p>
      </div>
      <button @click="approveManualReview()">人工放行</button>
    </div>

    <!-- 划词加词库按钮（跟随鼠标） -->
    <div x-show="selectionText && selectionRect"
         x-cloak
         :style="`top:${selectionRect?.top - 40}px; left:${Math.min(selectionRect?.left || 0, window.innerWidth - 120)}px;`"
         class="fixed z-30">
      <button @click="openDictModal()"
        class="bg-brand-600 text-white px-3 py-1.5 rounded-lg shadow-lg text-xs hover:bg-brand-700">
        ➕ 加入词库
      </button>
    </div>

    <!-- 加词弹窗 -->
    <div x-show="showDictModal" x-cloak
         @keydown.escape.window="showDictModal=false"
         class="fixed inset-0 bg-black/40 flex items-center justify-center z-40 p-4"
         @click.self="showDictModal=false">
      <div class="bg-white rounded-xl p-5 max-w-md w-full">
        <h3 class="text-lg font-bold mb-3">➕ 加入词库</h3>

        <label class="block text-xs font-medium mb-1 text-slate-600">英文原词</label>
        <input type="text" x-model="dictForm.en"
          class="w-full px-3 py-2 border rounded-lg text-sm mb-2"
          placeholder="e.g. Final Fantasy Tactics">

        <label class="block text-xs font-medium mb-1 text-slate-600">中文译名</label>
        <input type="text" x-model="dictForm.cn"
          class="w-full px-3 py-2 border rounded-lg text-sm mb-2"
          placeholder="如：最终幻想战略版">

        <div class="grid grid-cols-2 gap-2 mb-3">
          <div>
            <label class="block text-xs font-medium mb-1 text-slate-600">分类</label>
            <select x-model="dictForm.cat" class="w-full px-3 py-2 border rounded-lg text-sm">
              <option value="games">游戏 games</option>
              <option value="movies_tv">影视 movies_tv</option>
              <option value="companies">公司 companies</option>
              <option value="people">人物 people</option>
              <option value="media">媒体 media</option>
              <option value="terms">术语 terms</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium mb-1 text-slate-600">来源</label>
            <select x-model="dictForm.source" class="w-full px-3 py-2 border rounded-lg text-sm">
              <option value="user">user（用户确认）</option>
              <option value="ign_cn">ign_cn</option>
              <option value="bilibili">bilibili</option>
              <option value="consensus">consensus</option>
              <option value="ai_guess">ai_guess</option>
            </select>
          </div>
        </div>

        <div x-show="dictExisting" class="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded p-2 mb-2">
          ⚠️ 词库已存在该词：<span x-text="dictExisting?.cn"></span> （来源: <span x-text="dictExisting?.source"></span>）
          <br>保存将覆盖。
        </div>

        <div class="flex gap-2">
          <button @click="saveDict()"
            :disabled="!dictForm.en || !dictForm.cn || dictSaving"
            class="px-3 py-1.5 bg-brand-600 text-white rounded-lg text-sm disabled:bg-slate-300">
            <span x-show="!dictSaving">💾 保存</span>
            <span x-show="dictSaving">保存中...</span>
          </button>
          <button @click="showDictModal=false" class="px-3 py-1.5 text-slate-500 text-sm">取消</button>
        </div>
      </div>
    </div>

    <!-- 段落编辑弹窗 -->
    <div x-show="showEditPara" x-cloak
         @keydown.escape.window="showEditPara=false"
         class="fixed inset-0 bg-black/40 flex items-center justify-center z-40 p-4"
         @click.self="showEditPara=false">
      <div class="bg-white rounded-xl p-5 max-w-2xl w-full">
        <h3 class="text-base font-bold mb-3">✏️ 编辑译文（段 <span x-text="editParaIdx + 1"></span>）</h3>
        <div class="text-xs text-slate-500 mb-1">英文原文：</div>
        <div class="text-xs bg-slate-50 rounded p-2 mb-3 leading-relaxed" x-text="editParaEn"></div>
        <div class="text-xs text-slate-500 mb-1">中文译文：</div>
        <textarea x-model="editParaCn" rows="6"
          class="w-full px-3 py-2 border rounded-lg text-sm leading-relaxed font-sans"></textarea>
        <div class="flex gap-2 mt-3 justify-end">
          <button @click="showEditPara=false" class="px-3 py-1.5 text-slate-500 text-sm">取消</button>
          <button @click="saveEditPara()" :disabled="editParaSaving"
            class="px-3 py-1.5 bg-brand-600 text-white rounded-lg text-sm disabled:bg-slate-300">
            <span x-show="!editParaSaving">💾 保存</span>
            <span x-show="editParaSaving">保存中...</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 反馈评论弹窗 -->
    <div x-show="showFeedbackModal" x-cloak
         @keydown.escape.window="showFeedbackModal=false"
         class="fixed inset-0 bg-black/40 flex items-center justify-center z-40 p-4"
         @click.self="showFeedbackModal=false">
      <div class="bg-white rounded-xl p-5 max-w-md w-full">
        <h3 class="text-base font-bold mb-3">👎 反馈问题</h3>
        <textarea x-model="feedbackInput" rows="4" placeholder="什么地方译得不好？希望怎么调整？"
          class="w-full px-3 py-2 border rounded-lg text-sm"></textarea>
        <div class="flex gap-2 mt-3 justify-end">
          <button @click="showFeedbackModal=false" class="px-3 py-1.5 text-slate-500 text-sm">取消</button>
          <button @click="saveFeedback()" class="px-3 py-1.5 bg-brand-600 text-white rounded-lg text-sm">保存反馈</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div x-show="toast" x-cloak x-transition.opacity
         class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50"
         x-text="toast"></div>

    <div x-show="article" class="flex-1 min-h-0 overflow-hidden">
      <!-- Two-pane: 左译文 / 右原文iframe -->
      <div x-show="mode === 'compare'" class="reader-grid h-full">
        <!-- 左：中文译文（按段落对照） -->
        <div class="reader-pane cn">
          <div class="w-full">
            <h2 class="text-xl font-bold mb-1" x-text="article?.cn_title"></h2>
            <p x-show="article?.subtitle" class="text-base text-slate-600 leading-snug mb-2" x-text="article?.subtitle"></p>
            <p x-show="article?.en_title" class="text-sm text-slate-400 italic mb-1" x-text="article?.en_title"></p>
            <p class="text-sm text-slate-400 mb-2">
              <span x-text="`翻译于 ${article?.translated_at || ''}`"></span>
              <span x-show="translatorLabel(article)" x-text="` · ${translatorLabel(article)}`"></span>
            </p>

            <!-- AI 极简总结 -->
            <div x-show="article?.opus_summary" x-cloak
                 class="bg-gradient-to-br from-amber-50 to-orange-50 border-l-4 border-amber-400 p-3 mb-4 rounded">
              <div class="flex items-start gap-2">
                <span class="text-amber-600 text-sm font-bold">🎯</span>
                <div class="flex-1">
                  <div class="flex items-center gap-2 mb-1">
                    <div class="text-xs text-amber-700 font-medium">极简总结（AI 生成）</div>
                    <button @click="copyOpusSummary()"
                            class="text-xs px-2 py-0.5 rounded bg-amber-100 text-amber-800 hover:bg-amber-200 border border-amber-300"
                            title="复制 70-80 字总结">
                      <span x-text="summaryBtnText"></span>
                    </button>
                  </div>
                  <p class="text-sm text-slate-700 leading-relaxed" x-text="article?.opus_summary"></p>
                </div>
              </div>
            </div>

            <!-- 评分条 -->
            <div class="feedback-bar mb-4">
              <button :class="feedback === 'good' ? 'active' : ''" @click="submitFeedback('good')">👍 不错</button>
              <button :class="feedback === 'bad' ? 'active' : ''" @click="submitFeedback('bad')">👎 有问题</button>
              <span x-show="feedbackComment" class="text-xs text-slate-500 self-center ml-2" x-text="`：${feedbackComment}`"></span>
            </div>

            <!-- 图片面板 -->
            <div x-show="article?.images?.length > 0" x-cloak class="bg-slate-50 border rounded-lg mb-4">
              <div class="p-2 border-b flex items-center justify-between">
                <div class="text-sm font-semibold">📸 文章配图 (<span x-text="article?.images?.length"></span>)</div>
                <div class="flex gap-1">
                  <button @click="showImagesPanel = !showImagesPanel" class="text-xs text-slate-500 hover:text-brand-600">
                    <span x-text="showImagesPanel ? '收起' : '展开'"></span>
                  </button>
                  <button @click="downloadAllImages()" :disabled="imageDownloading"
                    class="text-xs px-2 py-0.5 bg-brand-600 text-white rounded disabled:bg-slate-300"
                    title="打包 ZIP 下载所有图片">
                    <span x-show="!imageDownloading">⬇ 打包下载</span>
                    <span x-show="imageDownloading" x-text="`打包中 ${imageProgress}/${article?.images?.length}`"></span>
                  </button>
                </div>
              </div>
              <div x-show="showImagesPanel" class="p-2 grid grid-cols-2 sm:grid-cols-3 gap-2">
                <template x-for="(img, i) in article?.images || []" :key="i">
                  <div class="relative group bg-white rounded border overflow-hidden">
                    <img :src="imgUrl(img)" :alt="imgAlt(img)" class="w-full h-24 object-cover" loading="lazy"
                         referrerpolicy="no-referrer"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="hidden h-24 items-center justify-center text-xs text-slate-400 bg-slate-100">加载失败</div>
                    <button @click="downloadOneImage(imgUrl(img), i)"
                      class="absolute bottom-1 right-1 bg-black/60 hover:bg-black/80 text-white rounded text-xs px-2 py-0.5 opacity-0 group-hover:opacity-100">⬇</button>
                    <a :href="imgUrl(img)" target="_blank" rel="noopener"
                      class="absolute top-1 right-1 bg-black/60 hover:bg-black/80 text-white rounded text-xs px-1 py-0.5 opacity-0 group-hover:opacity-100" title="原图查看">🔍</a>
                    <div x-show="i === 0" class="absolute top-1 left-1 bg-amber-500 text-white text-[10px] px-1 rounded">封面</div>
                  </div>
                </template>
              </div>
            </div>

            <!-- 待入库候选词面板 -->
            <div x-show="article?.pending_dict?.length > 0" x-cloak
                 class="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4">
              <div class="flex items-center justify-between mb-2">
                <h3 class="text-sm font-semibold text-amber-900">
                  📝 本文新词候选 (<span x-text="article?.pending_dict?.length"></span>)
                </h3>
                <span class="text-xs text-amber-700">你决定是否入库</span>
              </div>
              <div class="space-y-2">
                <template x-for="(c, i) in article?.pending_dict || []" :key="i">
                  <div class="bg-white rounded border border-amber-200 p-2">
                    <div class="flex items-start gap-2 flex-wrap">
                      <div class="flex-1 min-w-0">
                        <div class="text-sm">
                          <span class="font-semibold" x-text="c.en"></span>
                          <span class="text-slate-400 mx-1">→</span>
                          <input type="text" x-model="c.cn"
                            class="text-sm border-b border-slate-300 px-1 py-0.5 bg-transparent focus:outline-none focus:border-brand-600"
                            :style="`width: ${Math.min(Math.max(c.cn.length * 14 + 20, 100), 280)}px;`">
                        </div>
                        <div class="text-xs text-slate-500 mt-1 flex items-center gap-2 flex-wrap">
                          <select x-model="c.cat" class="border rounded px-1 py-0.5 text-xs">
                            <option value="games">games</option>
                            <option value="movies_tv">movies_tv</option>
                            <option value="companies">companies</option>
                            <option value="people">people</option>
                            <option value="media">media</option>
                            <option value="terms">terms</option>
                          </select>
                          <select x-model="c.source" class="border rounded px-1 py-0.5 text-xs">
                            <option value="user">user</option>
                            <option value="ign_cn">ign_cn</option>
                            <option value="bilibili">bilibili</option>
                            <option value="consensus">consensus</option>
                            <option value="ai_guess">ai_guess</option>
                          </select>
                          <span x-show="c.note" class="text-amber-700 italic" x-text="'• ' + c.note"></span>
                        </div>
                        <!-- 上下文预览 -->
                        <div x-show="findContext(c.en)" class="text-xs bg-slate-50 rounded mt-1 p-1.5 leading-relaxed" x-html="findContext(c.en)"></div>
                      </div>
                      <div class="flex gap-1 shrink-0">
                        <button @click="approvePending(i)"
                          class="px-2 py-1 bg-green-600 text-white rounded text-xs hover:bg-green-700">
                          ✅ 入库
                        </button>
                        <button @click="ignorePending(i)"
                          class="px-2 py-1 border border-slate-300 text-slate-600 rounded text-xs hover:bg-slate-100">
                          🗑 忽略
                        </button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
              <div x-show="article?.pending_dict?.length > 1" class="mt-2 flex gap-2">
                <button @click="approveAllPending()"
                  class="px-2 py-1 bg-green-600 text-white rounded text-xs hover:bg-green-700">
                  ✅✅ 全部入库
                </button>
                <button @click="ignoreAllPending()"
                  class="px-2 py-1 border text-slate-600 rounded text-xs hover:bg-slate-100">
                  🗑 全部忽略
                </button>
              </div>
            </div>
            <template x-for="(p, idx) in article?.paragraphs || []" :key="idx">
              <div class="para-row" :class="{'mobile-hide-en': viewMode==='cn', 'mobile-hide-cn': viewMode==='en'}">
                <div class="para-cn-wrap">
                  <p class="para-cn" x-html="highlightMissEn(paragraphCn(p))"></p>
                  <button class="para-edit-btn" @click="openEditPara(idx)" title="编辑该段译文">✏️</button>
                </div>
                <p class="para-en lg:block" :class="{'lg:hidden': viewMode==='cn' || viewMode==='en'}" x-text="p.en"></p>
              </div>
            </template>
          </div>
        </div>

        <!-- 右：IGN 原文 iframe（可能被IGN拒绝） -->
        <div class="reader-pane en p-0 relative">
          <div x-show="!iframeLoaded && !iframeFailed" class="absolute inset-0 flex items-center justify-center text-slate-400 text-sm">
            正在尝试加载 IGN 原网页...
          </div>
          <div x-show="iframeFailed" class="p-4">
            <div class="bg-amber-50 border border-amber-200 text-amber-800 rounded-lg p-3 text-sm mb-3">
              ⚠️ IGN 不允许在 iframe 中嵌入。下方显示的是抓取的英文原文段落（与左侧译文一一对应）。
              <a x-show="article?.url" :href="article?.url" target="_blank" class="underline">在新标签打开IGN原文</a>
            </div>
            <h2 class="text-xl font-bold mb-1" x-text="article?.en_title"></h2>
            <template x-for="(p, idx) in article?.paragraphs || []" :key="idx">
              <p class="mb-3 leading-relaxed text-sm text-slate-700" x-text="p.en"></p>
            </template>
          </div>
          <iframe x-show="!iframeFailed && article?.url" :src="article?.url"
            class="w-full h-full border-0"
            @load="iframeLoaded = true"
            @error="iframeFailed = true"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
        </div>
      </div>

      <!-- 仅中文模式 -->
      <div x-show="mode === 'cn'" class="reader-pane cn h-full overflow-y-auto">
        <div class="w-full py-4">
          <h2 class="text-xl font-bold mb-1" x-text="article?.cn_title"></h2>
          <p x-show="article?.subtitle" class="text-base text-slate-600 leading-snug mb-2" x-text="article?.subtitle"></p>
          <p x-show="article?.en_title" class="text-sm text-slate-400 italic mb-1" x-text="article?.en_title"></p>
          <p class="text-sm text-slate-400 mb-4">
            <span x-text="`翻译于 ${article?.translated_at || ''}`"></span>
            <span x-show="translatorLabel(article)" x-text="` · ${translatorLabel(article)}`"></span>
          </p>
          <!-- AI 极简总结 -->
          <div x-show="article?.opus_summary" x-cloak
               class="bg-gradient-to-br from-amber-50 to-orange-50 border-l-4 border-amber-400 p-3 mb-4 rounded">
            <div class="flex items-start gap-2">
              <span class="text-amber-600 text-sm font-bold">🎯</span>
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-1">
                  <div class="text-xs text-amber-700 font-medium">极简总结（AI 生成）</div>
                  <button @click="copyOpusSummary()"
                          class="text-xs px-2 py-0.5 rounded bg-amber-100 text-amber-800 hover:bg-amber-200 border border-amber-300"
                          title="复制 70-80 字总结">
                    <span x-text="summaryBtnText"></span>
                  </button>
                </div>
                <p class="text-sm text-slate-700 leading-relaxed" x-text="article?.opus_summary"></p>
              </div>
            </div>
          </div>
          <template x-for="(p, idx) in article?.paragraphs || []" :key="idx">
            <div class="para-cn-wrap">
              <p class="para-cn mb-4 leading-relaxed" x-html="highlightMissEn(paragraphCn(p))"></p>
              <button class="para-edit-btn" @click="openEditPara(idx)" title="编辑该段译文">✏️</button>
            </div>
          </template>
        </div>
      </div>

      <!-- 润色编辑模式（仅桌面端） -->
      <div x-show="mode === 'polish'" class="reader-grid polish-grid h-full">
        <!-- 左：原译文参考 -->
        <div class="reader-pane cn">
          <div class="w-full py-4">
            <div class="text-xs text-slate-500 mb-2">📖 参考原译文（只读）</div>
            <h2 class="text-xl font-bold mb-1" x-text="article?.cn_title"></h2>
            <p class="text-sm text-slate-500 italic mb-4" x-text="article?.cn_subtitle || article?.summary || ''"></p>
            <template x-for="(p, idx) in article?.paragraphs || []" :key="idx">
              <p class="mb-3 leading-relaxed text-sm text-slate-700" x-text="paragraphCn(p)"></p>
            </template>
          </div>
        </div>
        <!-- 右：你的润色输入 -->
        <div class="reader-pane en bg-amber-50/30">
          <div class="w-full py-4">
            <div class="flex items-center justify-between mb-3 sticky top-0 bg-amber-50/95 py-2 -my-2 z-10">
              <div class="text-sm font-semibold text-amber-900">✏️ 我的润色版本</div>
              <div class="flex items-center gap-2">
                <span x-show="polishDirty" class="text-xs text-orange-600">未保存</span>
                <span x-show="polishSaving" class="text-xs text-blue-600">保存中...</span>
                <span x-show="polishSavedAt" class="text-xs text-slate-500" x-text="`已保存 ${polishSavedAt}`"></span>
                <button @click="resetPolishFromTranslation()"
                  class="text-xs px-2 py-1 rounded border hover:bg-amber-100 text-slate-600"
                  title="用最新译文重置输入区（当前修改会丢失）">↻ 重置</button>
                <button @click="savePolish(true)" :disabled="polishSaving"
                  class="text-xs px-2 py-1 rounded bg-amber-600 text-white hover:bg-amber-700 disabled:bg-slate-300">
                  💾 保存
                </button>
              </div>
            </div>

            <label class="block text-xs font-medium mb-1 text-slate-600">标题</label>
            <input type="text" x-model="polishData.title" @input="onPolishInput()"
              class="w-full px-3 py-2 border rounded mb-3 text-base font-bold">

            <label class="block text-xs font-medium mb-1 text-slate-600">副标题 / 摘要</label>
            <input type="text" x-model="polishData.subtitle" @input="onPolishInput()"
              class="w-full px-3 py-2 border rounded mb-3 text-sm italic">

            <label class="block text-xs font-medium mb-1 text-slate-600">正文（换一行就是新段落）</label>
            <textarea x-model="polishData.body" @input="onPolishInput()"
              class="w-full px-3 py-2 border rounded text-sm leading-relaxed font-mono"
              rows="30"
              placeholder="按你的写作习惯：换一行就是新段落，不需要额外空一行..."></textarea>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function articleData() {
      return {
        article: null,
        error: '',
        iframeLoaded: false,
        iframeFailed: false,
        mode: 'compare',  // compare | cn

        // 加词相关
        selectionText: '',
        selectionRect: null,
        showDictModal: false,
        dictForm: { en: '', cn: '', cat: 'games', source: 'user' },
        dictData: null,
        dictExisting: null,
        dictSaving: false,
        toast: '',

        // 待入库候选词
        pendingSaving: false,
        pendingQueue: [],  // 后台任务队列
        pendingProcessing: false,  // 队列是否在跑

        // 视图模式（手机端）
        viewMode: 'cn',  // cn | en | both
        themeIcon: '🌗',

        // 段落编辑
        showEditPara: false,
        editParaIdx: -1,
        editParaCn: '',
        editParaEn: '',
        editParaSaving: false,

        // 反馈
        feedback: null,
        feedbackComment: '',
        showFeedbackModal: false,
        feedbackInput: '',

        // 图片下载
        showImagesPanel: true,
        imageDownloading: false,
        imageProgress: 0,
        // ---- 复制按钮 ----
        copyBtnText: '📋 复制全文',
        summaryBtnText: '📋 复制总结',
        // ---- 润色编辑 ----
        polishData: { title: '', subtitle: '', body: '', updated_at: null },
        polishDirty: false,
        polishSaving: false,
        polishSavedAt: '',
        polishStatus: '✏️ 润色',
        polishExists: false,
        polishSaveTimer: null,
        manualReviewApproving: false,


        async init() {
          // 主题图标
          const cur = localStorage.getItem('theme') || 'auto';
          this.themeIcon = cur === 'dark' ? '☀️' : (cur === 'light' ? '🌒' : '🌗');
          this.mode = window.innerWidth < 1024 ? 'cn' : 'compare';
          this.iframeLoaded = false;
          this.iframeFailed = false;
          this.polishDirty = false;
          this.polishSaving = false;
          const params = new URLSearchParams(location.search);
          const date = params.get('date');
          const id = params.get('id');
          if (!date || !id) {
            this.error = 'URL 缺少 date 或 id 参数';
            return;
          }
          const padded = String(id).padStart(2, '0');
          try {
            const res = await fetch(`data/${date}/translations/${padded}.json?t=${Date.now()}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            this.article = await res.json();
            // 如果没有原文 URL（旧数据缺少 url 字段），直接降级
            if (!this.article?.url) {
              this.iframeFailed = true;
            } else {
              // 有 url 则 5 秒超时降级
              setTimeout(() => {
                if (!this.iframeLoaded) this.iframeFailed = true;
              }, 5000);
            }
          } catch (e) {
            this.error = '加载译文失败：' + e.message;
            return;
          }
          // 加载反馈
          this.loadFeedback();
          // 加载润色版本
          this.loadPolish();
                    // 预加载词库
          try {
            const dictRes = await fetch('data/dict.json?t=' + Date.now());
            this.dictData = await dictRes.json();
          } catch (_) {}

          // 监听未入库英文点击
          window.addEventListener('miss-en-click', (e) => {
            const en = e.detail;
            this.dictForm = { en, cn: '', cat: 'games', source: 'user' };
            this.checkDictExisting();
            this.showDictModal = true;
          });

          // 监听选中文本
          this.bindSelection();
        },

        bindSelection() {
          document.addEventListener('mouseup', () => {
            setTimeout(() => {
              const sel = window.getSelection();
              const text = sel?.toString().trim() || '';
              if (text && text.length > 0 && text.length < 100) {
                const range = sel.getRangeAt(0);
                const rect = range.getBoundingClientRect();
                this.selectionText = text;
                this.selectionRect = { top: rect.top, left: rect.left };
              } else {
                this.selectionText = '';
                this.selectionRect = null;
              }
            }, 10);
          });
          // 点别处取消
          document.addEventListener('mousedown', (e) => {
            if (!e.target.closest('.fixed.z-30') && !e.target.closest('.fixed.z-40')) {
              this.selectionText = '';
              this.selectionRect = null;
            }
          });
        },

        openDictModal() {
          // 检测是中文还是英文
          const text = this.selectionText;
          const isChinese = /[\u4e00-\u9fa5]/.test(text);
          if (isChinese) {
            this.dictForm = { en: '', cn: text, cat: 'games', source: 'user' };
          } else {
            this.dictForm = { en: text, cn: '', cat: 'games', source: 'user' };
          }
          // 检测是否已存在
          this.checkDictExisting();
          this.showDictModal = true;
          this.selectionText = '';
          this.selectionRect = null;
        },

        checkDictExisting() {
          this.dictExisting = null;
          if (!this.dictData || !this.dictForm.en) return;
          for (const cat of ['games','movies_tv','companies','people','media','terms']) {
            const e = this.dictData[cat]?.[this.dictForm.en];
            if (e) {
              this.dictExisting = { ...e, cat };
              this.dictForm.cat = cat;
              return;
            }
          }
        },

        async saveDict() {
          if (!this.dictForm.en || !this.dictForm.cn) return;
          if (!localStorage.getItem('gh_token')) {
            this.flash('❌ 未配置 GitHub Token，请在首页右上角⚙️设置', 4000);
            return;
          }
          // 记录入库前的旧译名（同步译文要用）
          let oldCn = null;
          for (const cat of ['games','movies_tv','companies','people','media','terms']) {
            if (this.dictData?.[cat]?.[this.dictForm.en]) {
              oldCn = this.dictData[cat][this.dictForm.en].cn;
              break;
            }
          }
          // 本地立即关闭弹窗，后台保存
          const form = { ...this.dictForm };
          this.showDictModal = false;
          this.flash(`入库中: ${form.en} → ${form.cn}`);
          this.dictSaving = true;
          try {
            // 拉最新词库（避免覆盖别人的修改）
            const fresh = await GH.getFile('data/dict.json');
            const dict = JSON.parse(fresh.content);

            // 如果该词在别的分类里存在，先删掉旧的
            for (const cat of ['games','movies_tv','companies','people','media','terms']) {
              if (cat !== form.cat && dict[cat]?.[form.en]) {
                delete dict[cat][form.en];
              }
            }

            if (!dict[form.cat]) dict[form.cat] = {};
            dict[form.cat][form.en] = {
              cn: form.cn,
              source: form.source
            };
            dict._meta = dict._meta || {};
            dict._meta.last_updated = new Date().toISOString().slice(0,10);

            await GH.putFile('data/dict.json', JSON.stringify(dict, null, 2),
              `dict: add ${form.en} → ${form.cn} (${form.source})`);
            this.dictData = dict;

            // 同步到当前译文
            const synced = await this.syncSingleToCurrentArticle(form.en, form.cn, oldCn);
            if (synced > 0) {
              this.flash(`✅ 已入库，译文同步了 ${synced} 处`);
            } else {
              this.flash(`✅ 已入库：${form.en} → ${form.cn}`);
            }
          } catch (e) {
            this.flash('❌ 保存失败：' + e.message, 5000);
          } finally {
            this.dictSaving = false;
          }
        },

        async syncSingleToCurrentArticle(en, newCn, oldCn) {
          if (!this.article || !Array.isArray(this.article.paragraphs)) return 0;
          let modified = 0;
          let changed = false;
          for (const p of this.article.paragraphs) {
            const cn = p.cn || '';
            if (oldCn && oldCn !== newCn && cn.includes(oldCn)) {
              p.cn = cn.replaceAll(oldCn, newCn);
              modified++;
              changed = true;
            } else if (cn.includes(en) && !cn.includes(newCn)) {
              p.cn = cn.replaceAll(en, newCn);
              modified++;
              changed = true;
            }
          }
          if (changed) {
            // 保存译文改动
            const params = new URLSearchParams(location.search);
            const date = params.get('date');
            const id = params.get('id');
            const padded = String(id).padStart(2, '0');
            const path = `data/${date}/translations/${padded}.json`;
            const fresh = await GH.getFile(path);
            const data = JSON.parse(fresh.content);
            data.paragraphs = this.article.paragraphs;
            await GH.putFile(path, JSON.stringify(data, null, 2),
              `sync dict to article #${id}: ${en} → ${newCn}`);
          }
          return modified;
        },

        flash(msg, ms = 2500) {
          this.toast = msg;
          setTimeout(() => { this.toast = ''; }, ms);
        },

        // 待入库候选词——本地立即移除 + 后台异步保存
        approvePending(idx) {
          const c = this.article.pending_dict[idx];
          if (!c.en || !c.cn) {
            this.flash('❌ 译名不能为空', 3000);
            return;
          }
          if (!localStorage.getItem('gh_token')) {
            this.flash('❌ 未配置 GitHub Token，请在首页右上角⚙️设置', 4000);
            return;
          }
          // 1. 本地立即移除，用户马上可以点下一条
          const candidate = { ...c };
          this.article.pending_dict.splice(idx, 1);
          this.flash(`入库中: ${candidate.en} → ${candidate.cn}`);
          // 2. 后台任务入队串行执行（避免409冲突）
          this.pendingQueue.push({ type: 'approve', candidate });
          this.processPendingQueue();
        },

        ignorePending(idx) {
          // 本地立即移除
          const c = this.article.pending_dict[idx];
          this.article.pending_dict.splice(idx, 1);
          if (!localStorage.getItem('gh_token')) return;  // 未配 token 也可以本地隐藏
          this.pendingQueue.push({ type: 'ignore', candidate: c });
          this.processPendingQueue();
        },

        async processPendingQueue() {
          if (this.pendingProcessing) return;
          this.pendingProcessing = true;
          try {
            while (this.pendingQueue.length > 0) {
              // 批量拿出当前队列里的任务一起处理（同一轮合并提交）
              const batch = this.pendingQueue.splice(0, this.pendingQueue.length);
              const approves = batch.filter(x => x.type === 'approve').map(x => x.candidate);
              if (approves.length > 0) {
                await this.batchApproveToDict(approves);
                // 同步到当前译文（替换译文中的旧译名）
                await this.syncApprovesToCurrentArticle(approves);
              }
              // 保存当前 pending_dict 状态到 GitHub
              await this.savePendingDict(this.article.pending_dict);
            }
          } catch (e) {
            this.flash('❌ 后台保存失败：' + e.message, 5000);
          } finally {
            this.pendingProcessing = false;
          }
        },

        async syncApprovesToCurrentArticle(approves) {
          // 检测该译文中哪些段落需要替换
          if (!this.article || !Array.isArray(this.article.paragraphs)) return;
          let modifiedCount = 0;
          let articleChanged = false;

          // 先拿老词库（在入库前的状态）才能知道原中文译名
          // batchApproveToDict 已经入库了，但我们从 this.dictData 看以前的
          for (const c of approves) {
            const oldEntry = this.dictData?.[c.cat]?.[c.en];
            const oldCn = oldEntry?.cn;  // 之前的译名（如果有）
            const newCn = c.cn;

            for (let i = 0; i < this.article.paragraphs.length; i++) {
              const p = this.article.paragraphs[i];
              const cn = p.cn || '';
              if (oldCn && oldCn !== newCn && cn.includes(oldCn)) {
                p.cn = cn.replaceAll(oldCn, newCn);
                articleChanged = true;
                modifiedCount++;
              } else if (cn.includes(c.en) && !cn.includes(newCn)) {
                // 段落里还使用英文原词，也同步为中文
                p.cn = cn.replaceAll(c.en, newCn);
                articleChanged = true;
                modifiedCount++;
              }
            }
          }

          if (!articleChanged) return;

          // 更新 dictData（本地缓存）让下一次同步能拿到最新状态
          for (const c of approves) {
            if (!this.dictData[c.cat]) this.dictData[c.cat] = {};
            this.dictData[c.cat][c.en] = { cn: c.cn, source: c.source };
          }

          // 保存译文（savePendingDict 会一起保存 paragraphs 和 pending_dict）
          this.flash(`✅ 译文同步了 ${modifiedCount} 处`);
        },

        async batchApproveToDict(approves) {
          const fresh = await GH.getFile('data/dict.json');
          const dict = JSON.parse(fresh.content);
          for (const c of approves) {
            for (const cat of ['games','movies_tv','companies','people','media','terms']) {
              if (cat !== c.cat && dict[cat]?.[c.en]) delete dict[cat][c.en];
            }
            if (!dict[c.cat]) dict[c.cat] = {};
            dict[c.cat][c.en] = { cn: c.cn, source: c.source };
          }
          dict._meta = dict._meta || {};
          dict._meta.last_updated = new Date().toISOString().slice(0,10);
          const msg = approves.length === 1
            ? `dict: approve ${approves[0].en} → ${approves[0].cn}`
            : `dict: approve ${approves.length} entries`;
          await GH.putFile('data/dict.json', JSON.stringify(dict, null, 2), msg);
          this.dictData = dict;
          if (approves.length === 1) {
            this.flash(`✅ 已入库：${approves[0].en} → ${approves[0].cn}`);
          } else {
            this.flash(`✅ 已入库 ${approves.length} 条`);
          }
        },

        async approveAllPending() {
          if (!localStorage.getItem('gh_token')) {
            this.flash('❌ 未配置 GitHub Token', 4000);
            return;
          }
          const candidates = [...this.article.pending_dict].filter(c => c.en && c.cn);
          this.article.pending_dict = [];
          this.flash(`入库中: ${candidates.length} 条...`);
          for (const c of candidates) this.pendingQueue.push({ type: 'approve', candidate: c });
          this.processPendingQueue();
        },

        ignoreAllPending() {
          this.article.pending_dict = [];
          if (!localStorage.getItem('gh_token')) return;
          this.pendingQueue.push({ type: 'sync_only' });
          this.processPendingQueue();
        },

        async savePendingDict(newPending) {
          const params = new URLSearchParams(location.search);
          const date = params.get('date');
          const id = params.get('id');
          const padded = String(id).padStart(2, '0');
          const path = `data/${date}/translations/${padded}.json`;
          const fresh = await GH.getFile(path);
          const data = JSON.parse(fresh.content);
          data.pending_dict = newPending;
          // 同步本地 paragraphs 修改（如果有）
          if (Array.isArray(this.article?.paragraphs)) {
            data.paragraphs = this.article.paragraphs;
          }
          await GH.putFile(path, JSON.stringify(data, null, 2),
            `pending_dict + paragraphs: update for #${id}`);
        },

        // ✨ 重新应用词库：拉取最新 dict.json，按词库全量扫描替换本文译文
        async reapplyDict() {
          if (!confirm('将按最新词库重新扫描本文，把所有能识别的英文专有名词替换为中文译名。\n\n该操作会修改译文。继续吗？')) return;
          this.flash('🔄 重新应用词库中...', 30000);
          try {
            const params = new URLSearchParams(location.search);
            const date = params.get('date');
            const id = params.get('id');
            const padded = String(id).padStart(2, '0');
            const path = `data/${date}/translations/${padded}.json`;

            // 1. 拉取最新 dict.json
            const dictRes = await fetch(`data/dict.json?t=${Date.now()}`);
            const dict = await dictRes.json();
            // 汇总所有词条 (en -> cn)
            const all = {};
            for (const cat of ['games','movies_tv','companies','people','media','terms']) {
              const m = dict[cat] || {};
              for (const en of Object.keys(m)) {
                const v = m[en];
                const cn = (v && typeof v === 'object') ? v.cn : v;
                if (cn) all[en] = cn;
              }
            }

            // 2. 拉取本文 translation
            const fresh = await GH.getFile(path);
            const data = JSON.parse(fresh.content);

            // 3. 构建两阶段替换集
            // 阶段 A: en -> latest_cn (适用于译文里保留了原英文的词)
            const stageA = Object.entries(all).filter(([en, cn]) => cn !== en);
            stageA.sort((a, b) => b[0].length - a[0].length);

            // 阶段 B: old_cn -> latest_cn (适用于已意译过的词，需要 translated_terms 快照)
            const stageB = [];
            const tt = data.translated_terms || {};
            for (const [en, oldCn] of Object.entries(tt)) {
              const latestCn = all[en];
              // 只在: 词库有该词 且 新译名 ≠ 旧译名 且 旧译名遵循中文译法（!= en）
              if (latestCn && latestCn !== oldCn && oldCn !== en) {
                stageB.push([oldCn, latestCn]);
              }
            }
            stageB.sort((a, b) => b[0].length - a[0].length);

            // 4. 执行替换
            let paraReplaced = 0;
            const hits = new Set();

            const applyToText = (text) => {
              let t = text;
              for (const [en, cn] of stageA) {
                if (t.includes(en)) {
                  t = t.split(en).join(cn);
                  hits.add(`${en}→${cn}`);
                }
              }
              for (const [oldCn, newCn] of stageB) {
                if (t.includes(oldCn)) {
                  t = t.split(oldCn).join(newCn);
                  hits.add(`${oldCn}→${newCn} (重译)`);
                }
              }
              return t;
            };

            for (const para of (data.paragraphs || [])) {
              if (!para.cn) continue;
              const before = para.cn;
              para.cn = applyToText(para.cn);
              if (para.cn !== before) paraReplaced++;
            }
            if (data.cn_title) data.cn_title = applyToText(data.cn_title);
            if (data.summary) data.summary = applyToText(data.summary);

            // 5. 同步更新 translated_terms 快照（带上本次 stageB 所改的名字）
            for (const [en] of stageA) {
              tt[en] = all[en];
            }
            for (const [oldCn, newCn] of stageB) {
              for (const en of Object.keys(tt)) {
                if (tt[en] === oldCn) tt[en] = newCn;
              }
            }
            data.translated_terms = tt;

            if (paraReplaced === 0 && hits.size === 0) {
              this.flash('ℹ️ 没有发现可替换的词汇，译文未变', 3000);
              return;
            }

            // 6. 写回 translation
            const msg = `reapply dict: ${hits.size} terms replaced in #${id} (${paraReplaced} paragraphs)`;
            await GH.putFile(path, JSON.stringify(data, null, 2), msg);

            // 6.5 同步更新 index.json 里该文章的 cn_title / summary 让首页同步
            try {
              const idxPath = `data/${date}/index.json`;
              const idxFresh = await GH.getFile(idxPath);
              const idxData = JSON.parse(idxFresh.content);
              const art = (idxData.articles || []).find(a => a.id === parseInt(id));
              if (art) {
                let idxChanged = false;
                if (data.cn_title && art.cn_title !== data.cn_title) {
                  art.cn_title = data.cn_title; idxChanged = true;
                }
                if (data.summary && art.summary !== data.summary) {
                  art.summary = data.summary; idxChanged = true;
                }
                if (idxChanged) {
                  await GH.putFile(idxPath, JSON.stringify(idxData, null, 2),
                    `index.json: sync title/summary for #${id} after reapply`);
                }
              }
            } catch (e) {
              console.warn('index.json 同步失败:', e);
            }

            // 7. 同步到本地 article 对象
            this.article.paragraphs = data.paragraphs;
            if (data.cn_title) this.article.cn_title = data.cn_title;
            if (data.summary) this.article.summary = data.summary;

            this.flash(`✅ 已替换 ${hits.size} 个词（${paraReplaced} 个段落）`, 4000);
            console.log('Replaced:', [...hits]);
          } catch (e) {
            console.error(e);
            this.flash('❌ 重新应用失败：' + e.message, 5000);
          }
        },

        // ---- 主题 ----
        toggleTheme() {
          const next = window.appTheme.toggleTheme();
          this.themeIcon = next === 'dark' ? '☀️' : (next === 'light' ? '🌒' : '🌗');
          this.flash('主题：' + (next === 'auto' ? '跟随系统' : (next === 'dark' ? '深色' : '浅色')));
        },

        // ---- 未入库英文词高亮 ----
        highlightMissEn(text) {
          if (!text) return '';
          if (!this.dictData) return this.escapeHtml(text);
          // 提取所有英文词组（连续2+字符的英文token）
          const escaped = this.escapeHtml(text);
          // 已知词的所有英文keys，按长度倒序避免短词截断长词
          const known = new Set();
          for (const cat of ['games','movies_tv','companies','people','media','terms']) {
            for (const en of Object.keys(this.dictData[cat] || {})) known.add(en);
          }
          // 匹配连续英文片段（含空格、连字符、撇号、数字）
          // 只标记长度>=2的纯英文片段
          return escaped.replace(/[A-Za-z][A-Za-z0-9'\-]*(?:\s+[A-Za-z][A-Za-z0-9'\-]*){0,4}/g, (match) => {
            const trimmed = match.trim();
            if (trimmed.length < 2) return match;
            // 数字/常见小词忽略
            if (/^(of|the|a|an|in|on|at|to|is|or|by|for|and|as|it)$/i.test(trimmed)) return match;
            // 已在词库 → 不标
            if (known.has(trimmed)) return match;
            // 也检查更短的子集：如果只是单词且词库里有，跳过
            const words = trimmed.split(/\s+/);
            if (words.length === 1 && words[0].length < 3) return match;
            return `<span class="miss-en" onclick="window.dispatchEvent(new CustomEvent('miss-en-click',{detail:'${trimmed.replace(/'/g,'\\\'')}'}))">${match}</span>`;
          });
        },

        // ---- 候选词上下文预览 ----
        findContext(en) {
          if (!en || !this.article || !Array.isArray(this.article.paragraphs)) return '';
          for (const p of this.article.paragraphs) {
            const cn = p.cn || '';
            const en_ = p.en || '';
            // 中文段里包含该英文（保留英文的情况）
            if (cn.includes(en)) {
              return this.makeSnippet(cn, en);
            }
            // 英文段里包含 → 显示对应中文段
            if (en_.includes(en)) {
              return this.makeSnippet(cn, '') + ' <span class="text-slate-400">（英文段）</span>';
            }
          }
          return '';
        },

        makeSnippet(text, highlight) {
          if (!highlight) {
            return this.escapeHtml(text.length > 80 ? text.slice(0,80)+'…' : text);
          }
          const idx = text.indexOf(highlight);
          if (idx < 0) return this.escapeHtml(text.slice(0,80));
          const start = Math.max(0, idx - 20);
          const end = Math.min(text.length, idx + highlight.length + 30);
          const before = (start>0?'…':'') + this.escapeHtml(text.slice(start, idx));
          const hl = `<mark class="bg-amber-200">${this.escapeHtml(highlight)}</mark>`;
          const after = this.escapeHtml(text.slice(idx+highlight.length, end)) + (end<text.length?'…':'');
          return before + hl + after;
        },

        escapeHtml(s) {
          return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        },

        // ---- 段落编辑 ----
        paragraphCn(p) {
          if (!p) return '';
          if (typeof p === 'string') return p;
          return p.cn || p.zh || p.text_cn || p.translation || p.text || '';
        },

        needsManualReview() {
          if (!this.article || this.article.quality_status === 'manual_approved') return false;
          return !!(
            this.article.quality_status === 'needs_manual_review' ||
            this.article.manual_release_required ||
            this.article.audit_failure_reason ||
            (Array.isArray(this.article.audit_issues) && this.article.audit_issues.length > 0)
          );
        },

        manualReviewReason() {
          if (!this.article) return '';
          if (this.article.audit_failure_reason) return this.article.audit_failure_reason;
          const issues = Array.isArray(this.article.audit_issues) ? this.article.audit_issues : [];
          if (!issues.length) return 'API 质检未通过，请人工复核后再放行。';
          return issues.slice(0, 4).map(x => `[${x.type || 'issue'}] ${x.detail || ''}`).join('；');
        },

        async approveManualReview() {
          if (this.manualReviewApproving) return;
          if (!localStorage.getItem('gh_token')) {
            this.flash('❌ 未配置 GitHub Token，请在首页右上角设置', 4000);
            return;
          }
          if (!confirm('确认把这篇待复核草稿发布为正式译文？\n\n建议先修正词库、货币换算等问题。')) return;
          this.manualReviewApproving = true;
          try {
            const params = new URLSearchParams(location.search);
            const date = params.get('date');
            const id = parseInt(params.get('id'));
            const padded = String(id).padStart(2, '0');
            const transPath = `data/${date}/translations/${padded}.json`;
            const now = new Date().toISOString();

            const transFresh = await GH.getFile(transPath);
            const data = JSON.parse(transFresh.content);
            data.quality_status = 'manual_approved';
            data.manual_release_required = false;
            data.manual_approved_at = now;
            data.manual_approved_reason = 'user approved API audit draft';
            data.manual_approved_issues = data.audit_issues || [];
            delete data.audit_issues;
            delete data.audit_failed_at;
            delete data.audit_failure_reason;
            await GH.putFile(transPath, JSON.stringify(data, null, 2), `manual approve translation #${id}`);

            const indexPath = `data/${date}/index.json`;
            const idxFresh = await GH.getFile(indexPath);
            const idx = JSON.parse(idxFresh.content);
            const art = (idx.articles || []).find(a => parseInt(a.id) === id);
            if (art) {
              art.translation_status = 'done';
              art.translation_path = `translations/${padded}.json`;
              art.cn_title = data.cn_title || art.cn_title;
              art.summary = data.opus_summary || data.summary || art.summary;
              art.translator = data.translator || art.translator;
              art.translator_provider = data.translator_provider || art.translator_provider;
              art.translator_model = data.translator_model || art.translator_model;
              delete art.translation_error;
              delete art.translation_failed_at;
            }
            await GH.putFile(indexPath, JSON.stringify(idx, null, 2), `index: manual approve #${id}`);

            const failPath = `data/${date}/translation_failures.json`;
            try {
              const failFresh = await GH.getFile(failPath);
              if (failFresh) {
                const failures = JSON.parse(failFresh.content);
                if (failures.items) delete failures.items[String(id)];
                failures.updated_at = now;
                await GH.putFile(failPath, JSON.stringify(failures, null, 2), `translation failure: clear #${id}`);
              }
            } catch (_) {}

            this.article = data;
            this.flash('✅ 已人工放行为正式译文');
          } catch (e) {
            this.flash('❌ 放行失败：' + e.message, 5000);
          } finally {
            this.manualReviewApproving = false;
          }
        },

        formatTranslatorModel(model) {

        // ---- 一键复制译文（全角标点 + 去 markdown）----
        normalizePunctuation(text) {
          if (!text) return '';
          let s = String(text);

          // 1. 去 markdown / HTML 标记
          s = s.replace(/<[^>]+>/g, '');                    // HTML 标签
          s = s.replace(/\*\*([^*]+)\*\*/g, '$1');           // **bold**
          s = s.replace(/\*([^*]+)\*/g, '$1');               // *italic*
          s = s.replace(/__([^_]+)__/g, '$1');               // __bold__
          s = s.replace(/_([^_]+)_/g, '$1');                 // _italic_
          s = s.replace(/`([^`]+)`/g, '$1');                 // `code`
          s = s.replace(/^#{1,6}\s+/gm, '');                 // # heading
          s = s.replace(/^[-*+]\s+/gm, '');                  // - list
          s = s.replace(/^\d+\.\s+/gm, '');                  // 1. ordered list
          s = s.replace(/^>\s+/gm, '');                      // > quote
          s = s.replace(/!?\[([^\]]*)\]\([^)]+\)/g, '$1');   // [text](url) / ![alt](src)

          // 2. ASCII 标点 → 全角（中英文夹杂下谨慎转换）
          //    仅在中文上下文转换引号、逗号、句号、问号、感叹号、冒号、分号、括号
          //    法：前后至少一侧是中文 / 句首 / 句尾 才转换
          const CN = /[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/;
          const isCN = c => c && CN.test(c);

          // 逗号 ,
          s = s.replace(/(.)?,(.)?/g, (m, a, b) => {
            if (a === undefined && b === undefined) return m;
            if ((a && isCN(a)) || (b && isCN(b))) return (a || '') + '，' + (b || '');
            return m;
          });
          // 句号 . （小心小数 1.5 / 网址，只在中文环境且后面不是数字/字母时转）
          s = s.replace(/(.)\.(?=\s|$|[\u4e00-\u9fff])/g, (m, a) => {
            if (a && isCN(a)) return a + '。';
            return m;
          });
          // 问号 ?
          s = s.replace(/(.)?\?(.)?/g, (m, a, b) => {
            if ((a && isCN(a)) || (b && isCN(b))) return (a || '') + '？' + (b || '');
            return m;
          });
          // 感叹号 !
          s = s.replace(/(.)?!(.)?/g, (m, a, b) => {
            if ((a && isCN(a)) || (b && isCN(b))) return (a || '') + '！' + (b || '');
            return m;
          });
          // 冒号 :
          s = s.replace(/(.)?:(.)?/g, (m, a, b) => {
            if ((a && isCN(a)) || (b && isCN(b))) return (a || '') + '：' + (b || '');
            return m;
          });
          // 分号 ;
          s = s.replace(/(.)?;(.)?/g, (m, a, b) => {
            if ((a && isCN(a)) || (b && isCN(b))) return (a || '') + '；' + (b || '');
            return m;
          });

          // 括号 ( ) → （ ）仅当包裹中文时
          s = s.replace(/\(([^()]*)\)/g, (m, inner) => {
            return CN.test(inner) ? '（' + inner + '）' : m;
          });

          // 双引号 " → 「」 （成对出现才转）
          let quoteOpen = true;
          s = s.replace(/"/g, () => {
            const ch = quoteOpen ? '「' : '」';
            quoteOpen = !quoteOpen;
            return ch;
          });
          // 单引号 ' → ‘’ 不动（英文缩写会误伤，it's etc.）

          // 3. 多余空格 / 换行处理
          const protectedSpacingTerms = ['007 初露锋芒'];
          const protectedSpacing = [];
          for (const term of protectedSpacingTerms) {
            if (!s.includes(term)) continue;
            const key = `__IGN_SPACE_TERM_${protectedSpacing.length}__`;
            protectedSpacing.push([key, term]);
            s = s.split(term).join(key);
          }
          s = s.replace(/[ \t]+\n/g, '\n');                  // 行尾空格
          s = s.replace(/\n{3,}/g, '\n\n');                  // 连续空行
          // 中文与中文之间不该有空格（仅同行内，不跨换行）
          let prev;
          do {
            prev = s;
            s = s.replace(/([\u4e00-\u9fff])[ \t]+([\u4e00-\u9fff])/g, '$1$2');
          } while (s !== prev);
          // 中文标点两侧不该有空格
          s = s.replace(/\s+([\u3000-\u303f\uff00-\uffef\u300c\u300d\u300e\u300f])/g, '$1');
          s = s.replace(/([\u3000-\u303f\uff00-\uffef\u300c\u300d\u300e\u300f])\s+/g, '$1');

          for (const [key, term] of protectedSpacing) {
            s = s.split(key).join(term);
          }
          return s.trim();
        },

        async copyArticle() {
          if (!this.article) {
            this.flash('❌ 译文未加载', 2000);
            return;
          }
          const cnTitle = this.normalizePunctuation(this.article.cn_title || '');
          const subtitle = this.normalizePunctuation(this.article.subtitle || '');
          const paragraphs = this.article.paragraphs || [];
          const cnLines = paragraphs
            .map(p => this.normalizePunctuation((p.cn || '').trim()))
            .filter(s => s);
          if (!cnLines.length) {
            this.flash('⚠️ 该文章无译文段落', 2500);
            return;
          }
          const textParts = [];
          if (cnTitle) textParts.push(cnTitle);
          if (subtitle) textParts.push(subtitle);
          textParts.push(...cnLines);
          const text = textParts.join('\n\n');
          const esc = (s) => String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
          }[c]));
          const html = [
            '<article>',
            cnTitle ? `<h1>${esc(cnTitle)}</h1>` : '',
            subtitle ? `<p><em>${esc(subtitle)}</em></p>` : '',
            ...cnLines.map(p => `<p>${esc(p).replace(/\n/g, '<br>')}</p>`),
            '</article>'
          ].join('');

          const reset = () => setTimeout(() => { this.copyBtnText = '📋 复制全文'; }, 2000);
          try {
            if (navigator.clipboard?.write && window.ClipboardItem) {
              await navigator.clipboard.write([
                new ClipboardItem({
                  'text/plain': new Blob([text], { type: 'text/plain' }),
                  'text/html': new Blob([html], { type: 'text/html' }),
                })
              ]);
            } else {
              await navigator.clipboard.writeText(text);
            }
            this.copyBtnText = '✅ 已复制';
            reset();
          } catch (e) {
            const holder = document.createElement('div');
            holder.contentEditable = 'true';
            holder.innerHTML = html;
            holder.style.position = 'fixed';
            holder.style.left = '-9999px';
            holder.style.top = '0';
            document.body.appendChild(holder);
            const range = document.createRange();
            range.selectNodeContents(holder);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            try {
              document.execCommand('copy');
              this.copyBtnText = '✅ 已复制';
              reset();
            } catch (err) {
              this.flash('❌ 复制失败：' + (err?.message || err), 3000);
            } finally {
              sel.removeAllRanges();
              document.body.removeChild(holder);
            }
          }
        },

        async copyOpusSummary() {
          if (!this.article) {
            this.flash('❌ 译文未加载', 2000);
            return;
          }
          const summary = (this.article.opus_summary || '').trim();
          if (!summary) {
            this.flash('⚠️ 该文章暂无 70-80 字总结', 2500);
            return;
          }
          const text = this.normalizePunctuation(summary);
          const reset = () => setTimeout(() => { this.summaryBtnText = '📋 复制总结'; }, 2000);
          try {
            await navigator.clipboard.writeText(text);
            this.summaryBtnText = '✅ 已复制';
            reset();
          } catch (e) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try {
              document.execCommand('copy');
              this.summaryBtnText = '✅ 已复制';
              reset();
            } catch (err) {
              this.flash('❌ 复制失败：' + (err?.message || err), 3000);
            } finally {
              document.body.removeChild(ta);
            }
          }
        },

                async downloadAllImages() {
          if (!this.article?.images?.length || !window.JSZip) return;
          this.imageDownloading = true;
          this.imageProgress = 0;
          const zip = new JSZip();
          let okCount = 0, failCount = 0;
          for (let i = 0; i < this.article.images.length; i++) {
            const img = this.article.images[i];
            const url = this.imgUrl(img);
            const alt = this.imgAlt(img);
            try {
              const res = await fetch(url, { mode: 'cors' });
              if (!res.ok) throw new Error('HTTP ' + res.status);
              const blob = await res.blob();
              const ext = (url.split('.').pop() || 'jpg').split('?')[0].slice(0,5);
              const filename = `${String(i+1).padStart(2,'0')}-${alt ? alt.replace(/[^\w\u4e00-\u9fa5-]+/g, '_').slice(0,30) : 'image'}.${ext}`;
              zip.file(filename, blob);
              okCount++;
            } catch (e) {
              failCount++;
              console.warn('Failed:', url, e);
            }
            this.imageProgress = i + 1;
          }
          if (okCount === 0) {
            this.flash('❌ 所有图片下载均被CORS阻止，建议手动逐张右键另存', 6000);
            this.imageDownloading = false;
            return;
          }
          const date = (new URLSearchParams(location.search)).get('date');
          const id = (new URLSearchParams(location.search)).get('id');
          const safeTitle = (this.article.cn_title || 'images').replace(/[^\w\u4e00-\u9fa5-]+/g, '_').slice(0,30);
          const zipName = `${date}_${id}_${safeTitle}.zip`;
          const blob = await zip.generateAsync({ type: 'blob' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = zipName;
          a.click();
          URL.revokeObjectURL(a.href);
          this.imageDownloading = false;
          if (failCount > 0) {
            this.flash(`⚠️ 已下载 ${okCount} 张，${failCount} 张被CORS阻止`, 5000);
          } else {
            this.flash(`✅ 已下载 ${okCount} 张图片`);
          }
        },

        // ---- 润色 ----
        async loadPolish() {
          const params = new URLSearchParams(location.search);
          const date = params.get('date');
          const id = params.get('id');
          if (!date || !id) return;

          // 先读索引 _index.json 查找该 id 的实际文件名
          let actualPath = null;
          try {
            const idxRes = await fetch(`data/${date}/polished/_index.json?t=${Date.now()}`);
            if (idxRes.ok) {
              const idx = await idxRes.json();
              actualPath = idx[String(id)];
            }
          } catch (_) {}

          // 如果索引有则使用实际文件名；否则从当前 cn_title 推断（能匹配上则取，否则 fillFromTrans）
          const filename = actualPath || (this.makePolishFilename() + '.json');
          const url = `data/${date}/polished/${encodeURIComponent(filename)}?t=${Date.now()}`;
          try {
            const res = await fetch(url);
            if (res.ok) {
              const d = await res.json();
              const fallback = this.buildPolishDraftFromTranslation();
              const paragraphBody = Array.isArray(d.paragraphs)
                ? d.paragraphs.map(p => typeof p === 'string' ? p : (p?.cn || p?.text || '')).filter(Boolean).join('\n')
                : '';
              this.polishData = {
                title: d.title || d.cn_title || fallback.title,
                subtitle: d.subtitle || d.cn_subtitle || d.summary || fallback.subtitle,
                body: d.body || d.cn_body || d.content || paragraphBody || fallback.body,
                updated_at: d.updated_at || null,
              };
              this.polishExists = true;
              this.polishStatus = '✏️ 已润色';
              if (d.updated_at) {
                this.polishSavedAt = this.fmtTime(d.updated_at);
              }
            } else {
              // 没润色版 → 用翻译版预填
              this.fillPolishFromTranslation();
              this.polishExists = false;
              this.polishStatus = '✏️ 润色';
            }
          } catch (e) {
            this.fillPolishFromTranslation();
          }
        },

        fillPolishFromTranslation() {
          if (!this.article) return;
          this.polishData = this.buildPolishDraftFromTranslation();
          this.polishDirty = false;
        },

        async resetPolishFromTranslation() {
          if (!confirm('重置会删除本篇的润色记录（润色文件 + 索引），该文章将被视为未润色，不会计入夜间学习。继续吗？')) return;
          // 1. 本地状态重置
          this.fillPolishFromTranslation();
          this.polishDirty = false;
          this.polishStatus = '✏️ 润色';

          // 2. 删除 GitHub 上的润色文件 + 从 _index.json 中移除
          try {
            const params = new URLSearchParams(location.search);
            const date = params.get('date');
            const id = params.get('id');
            const indexPath = `data/${date}/polished/_index.json`;

            // 读索引找到该 id 对应的文件名
            let filename = null;
            try {
              const idxFresh = await GH.getFile(indexPath);
              const idxData = JSON.parse(idxFresh.content);
              filename = idxData[String(id)] || idxData[id];
              // 从索引中移除
              delete idxData[String(id)];
              delete idxData[id];
              await GH.putFile(indexPath, JSON.stringify(idxData, null, 2),
                `polish: remove #${id} from index (reset)`);
            } catch (e) {
              console.warn('读/写 _index.json 失败:', e);
            }

            // 删除润色文件本身
            if (filename) {
              try {
                const filePath = `data/${date}/polished/${filename}`;
                const fileFresh = await GH.getFile(filePath);
                if (fileFresh && fileFresh.sha) {
                  await GH.deleteFile(filePath, fileFresh.sha,
                    `polish: delete #${id} (reset)`);
                }
              } catch (e) {
                console.warn('删除润色文件失败:', e);
              }
            }

            this.flash('✅ 润色记录已删除', 2500);
          } catch (e) {
            console.error(e);
            this.flash('❌ 重置失败：' + e.message, 4000);
          }
        },

        openPolish() {
          if (window.innerWidth < 640) return; // 移动端不支持润色编辑
          this.mode = 'polish';
        },

        onPolishInput() {
          this.polishDirty = true;
          // 防抖：3秒后自动保存
          clearTimeout(this.polishSaveTimer);
          this.polishSaveTimer = setTimeout(() => this.savePolish(false), 3000);
        },

        makePolishFilename() {
          if (!this.article) return '';
          const id = String(this.article.id).padStart(2, '0');
          // 只保留中文、字母、数字；其他全部转为 _
          const title = (this.article.cn_title || 'untitled')
            .replace(/[^\u4e00-\u9fa5A-Za-z0-9]+/g, '_')
            .replace(/^_+|_+$/g, '')
            .slice(0, 60);
          return `${id}_${title}`;
        },

        fmtTime(iso) {
          try {
            const d = new Date(iso);
            const M = String(d.getMonth()+1).padStart(2,'0');
            const D = String(d.getDate()).padStart(2,'0');
            const h = String(d.getHours()).padStart(2,'0');
            const m = String(d.getMinutes()).padStart(2,'0');
          return `${M}-${D} ${h}:${m}`;
          } catch { return iso; }
        },

        polishParagraphsFromBody(body) {
          const text = String(body || '').replace(/\r\n/g, '\n').trim();
          if (!text) return [];
          return text
            .split('\n')
            .map(line => line.trim())
            .filter(line => line);
        },

        async savePolish(manual) {
          if (this.polishSaving) return;
          this.polishSaving = true;
          const params = new URLSearchParams(location.search);
          const date = params.get('date');
          const filename = this.makePolishFilename() + '.json';
          const path = `data/${date}/polished/${filename}`;
          const now = new Date().toISOString();
          this.polishData.updated_at = now;
          const polishParagraphs = this.polishParagraphsFromBody(this.polishData.body);
          const payload = {
            id: this.article.id,
            cn_title: this.article.cn_title,
            en_title: this.article.en_title,
            url: this.article.url,
            category: this.article.category,
            ...this.polishData,
            paragraphs: polishParagraphs,
          };
          try {
            await GH.putFile(path, JSON.stringify(payload, null, 2), `polish: ${this.article.cn_title}`);
            // 同步更新索引文件
            const idxPath = `data/${date}/polished/_index.json`;
            let idx = {};
            try {
              const cur = await GH.getFile(idxPath);
              idx = JSON.parse(cur.content);
            } catch (_) {}
            idx[String(this.article.id)] = filename;
            await GH.putFile(idxPath, JSON.stringify(idx, null, 2), `polish index: #${this.article.id}`);
            this.polishDirty = false;
            this.polishExists = true;
            this.polishStatus = '✏️ 已润色';
            this.polishSavedAt = this.fmtTime(now);
            if (manual) this.flash('✅ 润色已保存');
          } catch (e) {
            console.error('Save polish failed:', e);
            if (manual) this.flash('❌ 保存失败：' + e.message, 5000);
          } finally {
            this.polishSaving = false;
          }
        }
      }
    }
  </script>
