        },

        formatTranslatorModel(model) {
          const raw = String(model || '').trim();
          if (!raw) return '';
          const lower = raw.toLowerCase();
          if (lower.includes('deepseek') && lower.includes('v4') && lower.includes('pro')) return 'DeepSeek V4 Pro';
          if (lower.includes('deepseek') && lower.includes('v4') && lower.includes('flash')) return 'DeepSeek V4 Flash';
          if (lower.includes('deepseek')) return raw.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
          return raw;
        },

        translatorLabel(article) {
          const model = this.formatTranslatorModel(article?.translator_model);
          return model ? `由 ${model} 翻译` : '';
        },

        async loadFeedback() {
          const params = new URLSearchParams(location.search);
          const date = params.get('date');
          const id = params.get('id');
          try {
            const res = await fetch(`data/${date}/feedback.json?t=${Date.now()}`);
            if (!res.ok) return;
            const fb = await res.json();
            if (fb[id]) {
              this.feedback = fb[id].type;
              this.feedbackComment = fb[id].comment || '';
            }
          } catch (_) {}
        },

        // ---- 图片下载 ----
        async downloadOneImage(url, idx) {
          try {
            const res = await fetch(url, { mode: 'cors' });
            const blob = await res.blob();
            const ext = (url.split('.').pop() || 'jpg').split('?')[0].slice(0,5);
            const filename = `image-${String(idx+1).padStart(2,'0')}.${ext}`;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
          } catch (e) {
            // CORS 阻止 fetch → 直接打开新标签（用户右键保存）
            window.open(url, '_blank');
            this.flash('受 CORS 限制，已在新标签打开，请右键另存', 4000);
          }
        },

        // ---- 图片字段兼容（旧格式是 string，新格式是 {url, alt}）----
        imgUrl(img) {
          if (!img) return '';
          if (typeof img === 'string') return img;
          return img.url || img.src || '';
        },
        imgAlt(img) {
          if (!img) return '';
          if (typeof img === 'string') return '';
          return img.alt || img.title || '';
        },

        // ---- 一键复制译文（全角标点 + 去 markdown）----
        normalizePunctuation(text) {
          if (!text) return '';
          let s = this.normalizeChineseQuotes(String(text));

          // 1. 去 markdown / HTML 标记
          s = s.replace(/<[^>]+>/g, '');                    // HTML 标签
          s = s.replace(/\*\*([^*]+)\*\*/g, '$1');           // **bold**
          s = s.replace(/\*([^*]+)\*/g, '$1');               // *italic*
          s = s.replace(/__([^_]+)__/g, '$1');               // __bold__
          s = s.replace(/_([^_]+)_/g, '$1');                 // _italic_
          s = s.replace(/`([^`]+)`/g, '$1');                 // `code`
          s = s.replace(/^#{1,6}\s+/gm, '');                 // # heading
          s = s.replace(/^[-*+]\s+/gm, '');                  // - list
          s = s.replace(/^\d+\.\s+/gm, '');                  // 1. ordered list
          s = s.replace(/^>\s+/gm, '');                      // > quote
          s = s.replace(/!?\[([^\]]*)\]\([^)]+\)/g, '$1');   // [text](url) / ![alt](src)

          // 2. ASCII 标点 → 全角（中英文夹杂下谨慎转换）
          //    仅在中文上下文转换引号、逗号、句号、问号、感叹号、冒号、分号、括号
          //    法：前后至少一侧是中文 / 句首 / 句尾 才转换
          const CN = /[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/;
          const isCN = c => c && CN.test(c);

          // 逗号 ,
          s = s.replace(/(.)?,(.)?/g, (m, a, b) => {
            if (a === undefined && b === undefined) return m;
            if ((a && isCN(a)) || (b && isCN(b))) return (a || '') + '，' + (b || '');
            return m;
          });
          // 句号 . （小心小数 1.5 / 网址，只在中文环境且后面不是数字/字母时转）
          s = s.replace(/(.)\.(?=\s|$|[\u4e00-\u9fff])/g, (m, a) => {
            if (a && isCN(a)) return a + '。';
            return m;
          });
          // 问号 ?
          s = s.replace(/(.)?\?(.)?/g, (m, a, b) => {
            if ((a && isCN(a)) || (b && isCN(b))) return (a || '') + '？' + (b || '');
            return m;
          });
          // 感叹号 !
          s = s.replace(/(.)?!(.)?/g, (m, a, b) => {
            if ((a && isCN(a)) || (b && isCN(b))) return (a || '') + '！' + (b || '');
            return m;
          });
          // 冒号 :
          s = s.replace(/(.)?:(.)?/g, (m, a, b) => {
            if ((a && isCN(a)) || (b && isCN(b))) return (a || '') + '：' + (b || '');
            return m;
          });
          // 分号 ;
          s = s.replace(/(.)?;(.)?/g, (m, a, b) => {
            if ((a && isCN(a)) || (b && isCN(b))) return (a || '') + '；' + (b || '');
            return m;
          });

          // 括号 ( ) → （ ）仅当包裹中文时
          s = s.replace(/\(([^()]*)\)/g, (m, inner) => {
            return CN.test(inner) ? '（' + inner + '）' : m;
          });

          // 双引号 " → 「」 （成对出现才转）
          let quoteOpen = true;
          s = s.replace(/"/g, () => {
            const ch = quoteOpen ? '「' : '」';
            quoteOpen = !quoteOpen;
            return ch;
          });
          // 单引号 ' → ‘’ 不动（英文缩写会误伤，it's etc.）

          // 3. 多余空格 / 换行处理
          const protectedSpacingTerms = ['007 初露锋芒'];
          const protectedSpacing = [];
          for (const term of protectedSpacingTerms) {
            if (!s.includes(term)) continue;
            const key = `__IGN_SPACE_TERM_${protectedSpacing.length}__`;
            protectedSpacing.push([key, term]);
            s = s.split(term).join(key);
          }
          s = s.replace(/[ \t]+\n/g, '\n');                  // 行尾空格
          s = s.replace(/\n{3,}/g, '\n\n');                  // 连续空行
          // 中文与中文之间不该有空格（仅同行内，不跨换行）
          let prev;
          do {
            prev = s;
            s = s.replace(/([\u4e00-\u9fff])[ \t]+([\u4e00-\u9fff])/g, '$1$2');
          } while (s !== prev);
          // 中文标点两侧不该有空格
          s = s.replace(/\s+([\u3000-\u303f\uff00-\uffef\u300c\u300d\u300e\u300f])/g, '$1');
          s = s.replace(/([\u3000-\u303f\uff00-\uffef\u300c\u300d\u300e\u300f])\s+/g, '$1');

          for (const [key, term] of protectedSpacing) {
            s = s.split(key).join(term);
          }
          return s.trim();
        },

        normalizeChineseQuotes(text) {
          if (!text) return '';
          let open = true;
          return String(text)
            .replace(/\u201c/g, '\u300c')
            .replace(/\u201d/g, '\u300d')
            .replace(/["\uff02]/g, () => {
              const quote = open ? '\u300c' : '\u300d';
              open = !open;
              return quote;
            });
        },

        normalizeTranslationQuotes(data) {
          for (const key of ['cn_title', 'subtitle', 'summary', 'opus_summary']) {
            if (typeof data[key] === 'string') data[key] = this.normalizeChineseQuotes(data[key]);
          }
          for (const paragraph of data.paragraphs || []) {
            if (paragraph && typeof paragraph.cn === 'string') {
              paragraph.cn = this.normalizeChineseQuotes(paragraph.cn);
            }
          }
          return data;
        },

        currentArticleParams() {
          const params = new URLSearchParams(location.search);
          const date = params.get('date') || '';
          const id = params.get('id') || '';
          return { date, id, padded: String(id).padStart(2, '0') };
        },

        async loadSourceArticle() {
          if (this.sourceArticle) return this.sourceArticle;
          const { date, padded } = this.currentArticleParams();
          if (!date || !padded) return null;
          try {
            const res = await fetch(`data/${date}/sources/${padded}.json?t=${Date.now()}`);
            if (!res.ok) return null;
            this.sourceArticle = await res.json();
            return this.sourceArticle;
          } catch (_) {
            return null;
          }
        },

        sourceTitle(source) {
          return (source?.title_en || source?.en_title || source?.title || this.article?.en_title || this.article?.title_en || '').trim();
        },

        sourceSummary(source) {
          return (source?.summary_en || source?.description_en || this.article?.summary_en || '').trim();
        },

        sourceParagraphs(source) {
          if (Array.isArray(source?.paragraphs_en) && source.paragraphs_en.length) {
            return source.paragraphs_en.map(p => String(p || '').trim()).filter(Boolean);
          }
          if (source?.body_en) {
            return String(source.body_en).split(/\n+/).map(p => p.trim()).filter(Boolean);
          }
          const fromTranslation = (this.article?.paragraphs || [])
            .map(p => String(p?.en || p?.source || '').trim())
            .filter(Boolean);
          if (fromTranslation.length) return fromTranslation;
          if (this.article?.body_en) {
            return String(this.article.body_en).split(/\n+/).map(p => p.trim()).filter(Boolean);
          }
          return [];
        },

        escapeRegExp(text) {
          return String(text).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        },

        dictEntryCn(entry) {
          if (!entry) return '';
          if (typeof entry === 'string') return entry;
          return String(entry.cn || entry.zh || '').trim();
        },

        matchDictionaryTerms(text) {
          if (!this.dictData || !text) return [];
          const matches = [];
          const seen = new Set();
          const haystack = String(text);
          for (const [cat, terms] of Object.entries(this.dictData)) {
            if (cat === '_meta' || !terms || typeof terms !== 'object') continue;
            for (const [en, entry] of Object.entries(terms)) {
              const term = String(en || '').trim();
              const cn = this.dictEntryCn(entry);
              if (!term || !cn || term.length < 2) continue;
              const key = `${cat}\u0000${term}`;
              if (seen.has(key)) continue;
              const pattern = new RegExp(this.escapeRegExp(term), 'i');
              if (!pattern.test(haystack)) continue;
              seen.add(key);
              matches.push({
                cat,
                en: term,
                cn,
                source: typeof entry === 'object' ? (entry.source || '') : '',
              });
            }
          }
          return matches.sort((a, b) => b.en.length - a.en.length || a.en.localeCompare(b.en)).slice(0, 80);
        },

        pendingDictLines() {
          return (this.article?.pending_dict || [])
            .map(c => ({ en: String(c.en || '').trim(), cn: String(c.cn || '').trim(), cat: c.cat || 'pending' }))
            .filter(c => c.en && c.cn)
            .slice(0, 40);
        },

        buildGptTranslationPack(source) {
          const title = this.sourceTitle(source);
          const summary = this.sourceSummary(source);
          const paragraphs = this.sourceParagraphs(source);
          const sourceText = [title, summary, ...paragraphs].filter(Boolean).join('\n\n');
          const dictHits = this.matchDictionaryTerms(sourceText);
          const pendingHits = this.pendingDictLines();
          const { date, id } = this.currentArticleParams();
          const dictLines = dictHits.length
            ? dictHits.map(t => `- ${t.en} => ${t.cn}${t.source ? `（${t.source}）` : ''}`).join('\n')
            : '- 本文未命中已确认词库；遇到专名时优先保留英文或使用通行译名，不要自造译名。';
          const pendingLines = pendingHits.length
            ? '\n\n本文还有以下未确认新词候选，仅作参考；如果明显不合适，不要强行采用：\n' +
              pendingHits.map(t => `- ${t.en} => ${t.cn}`).join('\n')
            : '';
          const paragraphLines = paragraphs.map((p, i) => `[${i + 1}] ${p}`).join('\n\n');
          return [
            '你是 IGN Daily 的中文翻译助手。请把下面英文文章翻译成简体中文。',
            '',
            '硬性要求：',
            '- 严格遵从英文原意，不要扩写，不要改写成自己的观点，不要为了流畅而改变事实关系。',
            '- 标题和摘要可以自然，但仍必须忠于原文。',
            '- 正文按段落编号逐段翻译，输出段落数量必须与原文一致。',
            '- 英文双引号和弯引号在中文里统一使用「」；不要使用中文里的英文直引号。',
            '- Xbox 一律写作 XBOX。',
            '- 游戏、影视、公司、人物、平台、服务等专名必须优先遵守下方词库。',
            '- 金额、日期、平台名、游戏名、引语归属必须准确。',
            '',
            '输出格式：',
            '标题：',
            '摘要：（70字以内）',
            '正文：',
            '[1] ...',
            '[2] ...',
            '',
            `文章：${date} #${id}`,
            this.article?.url ? `原文链接：${this.article.url}` : '',
            '',
            '本篇命中词库：',
            dictLines,
            pendingLines,
            '',
            '英文标题：',
            title || '（无）',
            '',
            '英文摘要：',
            summary || '（无）',
            '',
            '英文正文：',
            paragraphLines || '（无正文段落）',
          ].filter(part => part !== '').join('\n');
        },

        async copyPlainText(text) {
          try {
            await navigator.clipboard.writeText(text);
            return true;
          } catch (_) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try {
              document.execCommand('copy');
              return true;
            } finally {
              document.body.removeChild(ta);
            }
          }
        },

        async copyGptTranslationPack() {
          if (!this.article) {
            this.flash('❌ 文章未加载', 2000);
            return;
          }
          if (!this.dictData) {
            try {
              const dictRes = await fetch('data/dict.json?t=' + Date.now());
              this.dictData = await dictRes.json();
            } catch (_) {}
          }
          const source = await this.loadSourceArticle();
          const paragraphs = this.sourceParagraphs(source);
          if (!paragraphs.length && !this.sourceTitle(source)) {
            this.flash('⚠️ 没有找到可复制的英文原文', 3000);
            return;
          }
          const text = this.buildGptTranslationPack(source);
          const reset = () => setTimeout(() => { this.gptCopyBtnText = '🤖 复制GPT包'; }, 2000);
          try {
            await this.copyPlainText(text);
            this.gptCopyBtnText = '✅ 已复制GPT包';
            this.flash('✅ 已复制 GPT 翻译包，可直接粘贴到你的 GPTs', 2500);
            reset();
          } catch (e) {
            this.flash('❌ 复制失败：' + (e?.message || e), 3000);
          }
        },

        async copyArticle() {
          if (!this.article) {
            this.flash('❌ 译文未加载', 2000);
            return;
          }
          const cnTitle = this.normalizePunctuation(this.article.cn_title || '');
          const subtitle = this.normalizePunctuation(this.article.subtitle || '');
          const paragraphs = this.article.paragraphs || [];
          const cnLines = paragraphs
            .map(p => this.normalizePunctuation((p.cn || '').trim()))
            .filter(s => s);
          if (!cnLines.length) {
            this.flash('⚠️ 该文章无译文段落', 2500);
            return;
          }
          const textParts = [];
          if (cnTitle) textParts.push(cnTitle);
          if (subtitle) textParts.push(subtitle);
          textParts.push(...cnLines);
          const text = textParts.join('\n\n');
          const esc = (s) => String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
          }[c]));
          const html = [
            '<article>',
            cnTitle ? `<h1>${esc(cnTitle)}</h1>` : '',
            subtitle ? `<p><em>${esc(subtitle)}</em></p>` : '',
            ...cnLines.map(p => `<p>${esc(p).replace(/\n/g, '<br>')}</p>`),
            '</article>'
          ].join('');

          const reset = () => setTimeout(() => { this.copyBtnText = '复制全文'; }, 2000);
          try {
            if (navigator.clipboard?.write && window.ClipboardItem) {
              await navigator.clipboard.write([
                new ClipboardItem({
                  'text/plain': new Blob([text], { type: 'text/plain' }),
                  'text/html': new Blob([html], { type: 'text/html' }),
                })
              ]);
            } else {
              await navigator.clipboard.writeText(text);
            }
            this.copyBtnText = '已复制';
            reset();
          } catch (e) {
            const holder = document.createElement('div');
            holder.contentEditable = 'true';
            holder.innerHTML = html;
            holder.style.position = 'fixed';
            holder.style.left = '-9999px';
            holder.style.top = '0';
            document.body.appendChild(holder);
            const range = document.createRange();
            range.selectNodeContents(holder);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            try {
              document.execCommand('copy');
              this.copyBtnText = '已复制';
              reset();
            } catch (err) {
              this.flash('❌ 复制失败：' + (err?.message || err), 3000);
            } finally {
              sel.removeAllRanges();
              document.body.removeChild(holder);
            }
          }
        },

                async downloadAllImages() {
          if (!this.article?.images?.length || !window.JSZip) return;
          this.imageDownloading = true;
          this.imageProgress = 0;
          const zip = new JSZip();
          let okCount = 0, failCount = 0;
          for (let i = 0; i < this.article.images.length; i++) {
            const img = this.article.images[i];
            const url = this.imgUrl(img);
            const alt = this.imgAlt(img);
            try {
              const res = await fetch(url, { mode: 'cors' });
              if (!res.ok) throw new Error('HTTP ' + res.status);
              const blob = await res.blob();
              const ext = (url.split('.').pop() || 'jpg').split('?')[0].slice(0,5);
              const filename = `${String(i+1).padStart(2,'0')}-${alt ? alt.replace(/[^\w\u4e00-\u9fa5-]+/g, '_').slice(0,30) : 'image'}.${ext}`;
              zip.file(filename, blob);
              okCount++;
            } catch (e) {
              failCount++;
              console.warn('Failed:', url, e);
            }
            this.imageProgress = i + 1;
          }
          if (okCount === 0) {
            this.flash('❌ 所有图片下载均被CORS阻止，建议手动逐张右键另存', 6000);
            this.imageDownloading = false;
            return;
          }
          const date = (new URLSearchParams(location.search)).get('date');
          const id = (new URLSearchParams(location.search)).get('id');
          const safeTitle = (this.article.cn_title || 'images').replace(/[^\w\u4e00-\u9fa5-]+/g, '_').slice(0,30);
          const zipName = `${date}_${id}_${safeTitle}.zip`;
          const blob = await zip.generateAsync({ type: 'blob' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = zipName;
          a.click();
          URL.revokeObjectURL(a.href);
          this.imageDownloading = false;
          if (failCount > 0) {
            this.flash(`⚠️ 已下载 ${okCount} 张，${failCount} 张被CORS阻止`, 5000);
          } else {
            this.flash(`✅ 已下载 ${okCount} 张图片`);
          }
        },

        // ---- 润色 ----
        async loadPolish() {
          const params = new URLSearchParams(location.search);
          const date = params.get('date');
          const id = params.get('id');
          if (!date || !id) return;

          // 先读索引 _index.json 查找该 id 的实际文件名
          let actualPath = null;
          try {
            const idxRes = await fetch(`data/${date}/polished/_index.json?t=${Date.now()}`);
            if (idxRes.ok) {
              const idx = await idxRes.json();
              actualPath = idx[String(id)];
            }
          } catch (_) {}

          // 如果索引有则使用实际文件名；否则从当前 cn_title 推断（能匹配上则取，否则 fillFromTrans）
          const filename = actualPath || (this.makePolishFilename() + '.json');
          const url = `data/${date}/polished/${encodeURIComponent(filename)}?t=${Date.now()}`;
          try {
            const res = await fetch(url);
            if (res.ok) {
              const d = await res.json();
              const fallback = this.buildPolishDraftFromTranslation();
              const paragraphBody = Array.isArray(d.paragraphs)
                ? d.paragraphs.map(p => typeof p === 'string' ? p : (p?.cn || p?.text || '')).filter(Boolean).join('\n')
                : '';
              this.polishData = {
                title: d.title || d.cn_title || fallback.title,
                subtitle: d.subtitle || d.cn_subtitle || d.summary || fallback.subtitle,
                body: d.body || d.cn_body || d.content || paragraphBody || fallback.body,
                updated_at: d.updated_at || null,
              };
              this.polishExists = true;
              this.polishStatus = '已润色';
              if (d.updated_at) {
                this.polishSavedAt = this.fmtTime(d.updated_at);
              }
            } else {
              // 没润色版 → 用翻译版预填
              this.fillPolishFromTranslation();
              this.polishExists = false;
              this.polishStatus = '润色';
            }
          } catch (e) {
            this.fillPolishFromTranslation();
          }
        },

        fillPolishFromTranslation() {
          if (!this.article) return;
          this.polishData = this.buildPolishDraftFromTranslation();
          this.polishDirty = false;
        },

        async resetPolishFromTranslation() {
          if (!confirm('重置会删除本篇的润色记录（润色文件 + 索引），该文章将被视为未润色，不会计入夜间学习。继续吗？')) return;
          // 1. 本地状态重置
          this.fillPolishFromTranslation();
          this.polishDirty = false;
          this.polishStatus = '润色';

          // 2. 删除 GitHub 上的润色文件 + 从 _index.json 中移除
          try {
            const params = new URLSearchParams(location.search);
            const date = params.get('date');
            const id = params.get('id');
            const indexPath = `data/${date}/polished/_index.json`;

            // 读索引找到该 id 对应的文件名
            let filename = null;
            try {
              const idxFresh = await GH.getFile(indexPath);
              const idxData = JSON.parse(idxFresh.content);
              filename = idxData[String(id)] || idxData[id];
              // 从索引中移除
              delete idxData[String(id)];
              delete idxData[id];
              await GH.putFile(indexPath, JSON.stringify(idxData, null, 2),
                `polish: remove #${id} from index (reset)`);
            } catch (e) {
              console.warn('读/写 _index.json 失败:', e);
            }

            // 删除润色文件本身
            if (filename) {
              try {
                const filePath = `data/${date}/polished/${filename}`;
                const fileFresh = await GH.getFile(filePath);
                if (fileFresh && fileFresh.sha) {
                  await GH.deleteFile(filePath, fileFresh.sha,
                    `polish: delete #${id} (reset)`);
                }
              } catch (e) {
                console.warn('删除润色文件失败:', e);
              }
            }

            this.flash('✅ 润色记录已删除', 2500);
          } catch (e) {
            console.error(e);
            this.flash('❌ 重置失败：' + e.message, 4000);
          }
        },

        openPolish() {
          if (window.innerWidth < 640) return; // 移动端不支持润色编辑
          this.mode = 'polish';
        },

        onPolishInput() {
          this.polishDirty = true;
          // 防抖：3秒后自动保存
          clearTimeout(this.polishSaveTimer);
          this.polishSaveTimer = setTimeout(() => this.savePolish(false), 3000);
        },

        makePolishFilename() {
          if (!this.article) return '';
          const id = String(this.article.id).padStart(2, '0');
          // 只保留中文、字母、数字；其他全部转为 _
          const title = (this.article.cn_title || 'untitled')
            .replace(/[^\u4e00-\u9fa5A-Za-z0-9]+/g, '_')
            .replace(/^_+|_+$/g, '')
            .slice(0, 60);
          return `${id}_${title}`;
        },

        fmtTime(iso) {
          try {
            const d = new Date(iso);
            const M = String(d.getMonth()+1).padStart(2,'0');
            const D = String(d.getDate()).padStart(2,'0');
            const h = String(d.getHours()).padStart(2,'0');
            const m = String(d.getMinutes()).padStart(2,'0');
          return `${M}-${D} ${h}:${m}`;
          } catch { return iso; }
        },

        polishParagraphsFromBody(body) {
          const text = String(body || '').replace(/\r\n/g, '\n').trim();
          if (!text) return [];
          return text
            .split('\n')
            .map(line => line.trim())
            .filter(line => line);
        },

        async savePolish(manual) {
          if (this.polishSaving) return;
          this.polishSaving = true;
          const params = new URLSearchParams(location.search);
          const date = params.get('date');
          const filename = this.makePolishFilename() + '.json';
          const path = `data/${date}/polished/${filename}`;
          const now = new Date().toISOString();
          this.polishData.updated_at = now;
          const polishParagraphs = this.polishParagraphsFromBody(this.polishData.body);
          const payload = {
            id: this.article.id,
            cn_title: this.article.cn_title,
            en_title: this.article.en_title,
            url: this.article.url,
            category: this.article.category,
            ...this.polishData,
            paragraphs: polishParagraphs,
          };
          try {
            await GH.putFile(path, JSON.stringify(payload, null, 2), `polish: ${this.article.cn_title}`);
            // 同步更新索引文件
            const idxPath = `data/${date}/polished/_index.json`;
            let idx = {};
            try {
              const cur = await GH.getFile(idxPath);
              idx = JSON.parse(cur.content);
            } catch (_) {}
            idx[String(this.article.id)] = filename;
            await GH.putFile(idxPath, JSON.stringify(idx, null, 2), `polish index: #${this.article.id}`);
            this.polishDirty = false;
            this.polishExists = true;
            this.polishStatus = '已润色';
            this.polishSavedAt = this.fmtTime(now);
            if (manual) this.flash('✅ 润色已保存');
          } catch (e) {
            console.error('Save polish failed:', e);
            if (manual) this.flash('❌ 保存失败：' + e.message, 5000);
          } finally {
            this.polishSaving = false;
          }
        }
      }
    }
  </script>
