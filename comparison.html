<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>模型对比 — IGN Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090914;
      --panel: #151523;
      --panel-2: #1d1d2d;
      --border: #2d2d44;
      --text: #f5f6fb;
      --muted: #9ca3b8;
      --red: #e50914;
      --green: #2dd4bf;
      --purple: #8b5cf6;
      --blue: #60a5fa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    a { color: inherit; text-decoration: none; }
    .shell { max-width: 1360px; margin: 0 auto; padding: 22px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:18px; }
    .brand { display:flex; gap:12px; align-items:center; min-width:0; }
    .logo { width:36px; height:36px; border-radius:8px; background:var(--red); display:grid; place-items:center; font-weight:900; }
    h1 { font-size:1.15rem; margin:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .sub { color:var(--muted); font-size:0.78rem; margin-top:4px; }
    .btn { border:1px solid var(--border); background:var(--panel); color:var(--text); border-radius:8px; padding:8px 12px; font-weight:700; font-size:0.82rem; }
    .hero { border:1px solid var(--border); background:var(--panel); border-radius:8px; padding:16px; margin-bottom:14px; }
    .hero-title { font-size:1.35rem; font-weight:800; margin-bottom:6px; }
    .hero-en { color:var(--muted); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(360px, 1fr)); gap:14px; align-items:start; }
    .column { border:1px solid var(--border); background:var(--panel); border-radius:8px; overflow:hidden; }
    .column-head { padding:14px 16px; background:var(--panel-2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1; }
    .model { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--border); border-radius:999px; padding:4px 9px; color:var(--muted); font-size:0.78rem; }
    .dot { width:9px; height:9px; border-radius:3px; display:inline-block; }
    .pro { background:var(--purple); }
    .flash { background:var(--blue); }
    .section { padding:14px 16px; border-bottom:1px solid var(--border); }
    .label { color:var(--muted); font-size:0.72rem; font-weight:800; margin-bottom:7px; }
    .title { font-size:1.08rem; font-weight:800; line-height:1.45; }
    .subtitle { color:var(--green); font-weight:700; }
    .summary { line-height:1.75; color:#d9dbe8; }
    .para { display:grid; grid-template-columns:42px 1fr; gap:10px; padding:13px 16px; border-bottom:1px solid var(--border); line-height:1.85; }
    .idx { color:var(--muted); font-size:0.72rem; padding-top:3px; }
    .empty { color:var(--muted); padding:36px; text-align:center; border:1px solid var(--border); border-radius:8px; }
    @media (max-width: 860px) {
      .shell { padding:14px; }
      .topbar { align-items:flex-start; flex-direction:column; }
      .grid { grid-template-columns:1fr; }
      .column-head { position:static; }
    }
  </style>
  <link rel="stylesheet" href="assets/compliance.css?v=20260709beian1">
  <script defer src="assets/compliance.js?v=20260709beian1"></script>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div class="brand">
        <div class="logo">IGN</div>
        <div style="min-width:0;">
          <h1 id="pageTitle">模型翻译对比</h1>
          <div class="sub" id="pageSub">加载中...</div>
        </div>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <a class="btn" id="backLink" href="index.html">返回首页</a>
        <a class="btn" id="articleLink" href="#">正式译文</a>
      </div>
    </div>

    <div id="content"></div>
  </main>

  <script>
    function qs(name) { return new URLSearchParams(location.search).get(name); }
    function padId(id) { return String(id || '').padStart(2, '0'); }
    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function modelName(model) {
      const raw = String(model || 'unknown');
      const lower = raw.toLowerCase();
      if (lower.includes('deepseek') && lower.includes('v4') && lower.includes('pro')) return 'DeepSeek V4 Pro';
      if (lower.includes('deepseek') && lower.includes('v4') && lower.includes('flash')) return 'DeepSeek V4 Flash';
      return raw.replace(/-/g, ' ');
    }
    function modelClass(model) {
      return String(model || '').toLowerCase().includes('pro') ? 'pro' : 'flash';
    }
    function renderColumn(result) {
      const paragraphs = Array.isArray(result.paragraphs) ? result.paragraphs : [];
      return `
        <section class="column">
          <div class="column-head">
            <span class="model"><i class="dot ${modelClass(result.translator_model)}"></i>${esc(result.comparison_label || modelName(result.translator_model))}</span>
          </div>
          <div class="section">
            <div class="label">标题</div>
            <div class="title">${esc(result.cn_title || '')}</div>
          </div>
          <div class="section">
            <div class="label">副标题</div>
            <div class="subtitle">${esc(result.subtitle || '')}</div>
          </div>
          <div class="section">
            <div class="label">文章总结</div>
            <div class="summary">${esc(result.opus_summary || '')}</div>
          </div>
          ${paragraphs.map((p, i) => `
            <div class="para">
              <div class="idx">P${i + 1}</div>
              <div>${esc(p.cn || p.text || '')}</div>
            </div>
          `).join('')}
        </section>
      `;
    }
    async function load() {
      const date = qs('date');
      const id = Number(qs('id'));
      document.getElementById('backLink').href = `index.html?date=${encodeURIComponent(date || '')}`;
      document.getElementById('articleLink').href = `article.html?date=${encodeURIComponent(date || '')}&id=${id || ''}`;
      if (!date || !id) {
        document.getElementById('content').innerHTML = '<div class="empty">缺少 date 或 id 参数</div>';
        return;
      }
      try {
        const res = await fetch(`data/${date}/comparisons/${padId(id)}.json?t=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) throw new Error('对比结果还没有生成');
        const data = await res.json();
        document.getElementById('pageTitle').textContent = data.cn_title || data.en_title || '模型翻译对比';
        document.getElementById('pageSub').textContent = `${date} · #${id} · ${data.created_at_cn || ''}`;
        const results = Array.isArray(data.results) ? data.results : [];
        document.getElementById('content').innerHTML = `
          <section class="hero">
            <div class="hero-title">${esc(data.cn_title || '')}</div>
            <div class="hero-en">${esc(data.en_title || '')}</div>
          </section>
          <div class="grid">${results.map(renderColumn).join('')}</div>
        `;
      } catch (e) {
        document.getElementById('pageSub').textContent = '暂无对比结果';
        document.getElementById('content').innerHTML = `<div class="empty">${esc(e.message || e)}</div>`;
      }
    }
    load();
  </script>
  <footer class="site-compliance-footer" aria-label="备案信息">
    <div class="site-compliance-inner">
      <span data-compliance="copyright">Copyright © 2026 IGN Daily</span>
      <a data-compliance="icp" href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">粤ICP备2026092594号</a>
    </div>
  </footer>
</body>
</html>
